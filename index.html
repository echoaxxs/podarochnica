<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>#подарочница</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg: #0b0b0f;
      --card: #1c1c1e;
      --section: #1c1c1e;
      --text: #ffffff;
      --subtext: rgba(255,255,255,.65);
      --hint: rgba(255,255,255,.55);
      --separator: rgba(255,255,255,.08);
      --accent: #8e83ff;
      --accentText: #ffffff;
      --danger: #ff453a;
      --success: #30d158;
      --starColor: #FFD60A;
      --creditColor: #5AC8FA;
      --jackpotColor: #FF6B35;
      --jackpotGold: #FFD93D;

      --radius: 18px;
      --radius2: 14px;
      --shadow: 0 16px 50px rgba(0,0,0,.35);
    }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(142, 131, 255, 0.3); }
      50% { box-shadow: 0 0 40px rgba(142, 131, 255, 0.6); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes jackpotGlow {
      0%, 100% { 
        box-shadow: 0 0 40px rgba(255, 107, 53, 0.6), 0 0 80px rgba(255, 214, 10, 0.4);
        border-color: var(--jackpotColor);
      }
      50% { 
        box-shadow: 0 0 60px rgba(255, 107, 53, 0.9), 0 0 120px rgba(255, 214, 10, 0.6);
        border-color: var(--jackpotGold);
      }
    }

    @keyframes jackpotText {
      0%, 100% { 
        transform: scale(1); 
        text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
      }
      50% { 
        transform: scale(1.08); 
        text-shadow: 0 0 40px rgba(255, 214, 10, 1), 0 0 60px rgba(255, 107, 53, 1);
      }
    }

    @keyframes multiplierPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes confettiDrop {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes rainbowBorder {
      0% { border-color: #ff0000; }
      17% { border-color: #ff8000; }
      33% { border-color: #ffff00; }
      50% { border-color: #00ff00; }
      67% { border-color: #0080ff; }
      83% { border-color: #8000ff; }
      100% { border-color: #ff0000; }
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.15); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .app {
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 16px);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .sheet {
      width: 100%;
      max-width: 420px;
      background: color-mix(in oklab, var(--bg) 30%, transparent);
      border-radius: calc(var(--radius) + 6px);
      padding: 10px;
      padding-bottom: 80px;
    }

    .panel {
      background: var(--section);
      border: 1px solid var(--separator);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .topbar {
      padding: 14px 14px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: color-mix(in oklab, var(--section) 92%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--separator);
      z-index: 10;
    }

    .topbar .back {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
      padding: 8px 10px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .topbar .back:active { background: rgba(127,127,127,.14); transform: scale(0.95); }

    .topbar .title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    .topbar .ghost { width: 44px; height: 1px; }

    .content {
      padding: 14px;
      animation: fadeIn 0.35s ease-out;
    }
    
    #screenDetails .content { padding-bottom: 80px; }

    .muted { color: var(--subtext); font-size: 13px; font-weight: 500; }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 6px;
      background: rgba(0,0,0,.25);
      border-radius: 14px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: transparent;
      color: var(--subtext);
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab.active {
      background: var(--accent);
      color: var(--accentText);
      box-shadow: 0 4px 16px rgba(142, 131, 255, 0.35);
    }

    .tab:active { transform: scale(0.97); }

    .inset {
      background: color-mix(in oklab, var(--card) 92%, transparent);
      border: 1px solid var(--separator);
      border-radius: var(--radius2);
      overflow: hidden;
    }

    .insetHeader {
      padding: 14px 14px 10px;
      font-size: 13px;
      color: var(--hint);
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .grid {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .giftCard {
      background: rgba(127,127,127,.10);
      border: 1px solid var(--separator);
      border-radius: 16px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      user-select: none;
      cursor: pointer;
      transition: all 0.3s;
      animation: scaleIn 0.4s ease-out backwards;
    }
    
    .giftCard:nth-child(1) { animation-delay: 0.05s; }
    .giftCard:nth-child(2) { animation-delay: 0.1s; }
    .giftCard:nth-child(3) { animation-delay: 0.15s; }
    
    .giftCard:active { transform: scale(0.95); }

    .giftImg {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .giftImg img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      display: block;
      transition: transform 0.3s ease;
    }
    
    .giftCard:active .giftImg img { transform: scale(1.08); }

    .pricePill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--separator);
      font-weight: 700;
      font-size: 13px;
      color: var(--starColor);
    }

    .star {
      width: 14px; height: 14px; display: inline-block;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    .preview {
      width: 100%;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--separator);
      overflow: hidden;
      display: grid;
      place-items: center;
      animation: scaleIn 0.35s ease-out;
    }
    .preview img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px;
      border-top: 1px solid var(--separator);
      font-size: 15px;
    }
    .row:first-child { border-top: 0; }
    .row .right { color: var(--starColor); font-weight: 700; display: flex; align-items: center; gap: 4px; }

    .toggleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .toggleRow:active { background: rgba(127,127,127,.08); }

    .toggle {
      width: 51px;
      height: 31px;
      background: rgba(120, 120, 128, 0.32);
      border-radius: 16px;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .toggle.on { background: var(--success); }

    .toggle::after {
      content: "";
      position: absolute;
      width: 27px;
      height: 27px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
      box-shadow: 0 3px 8px rgba(0,0,0,.2);
    }

    .toggle.on::after { transform: translateX(20px); }

    .selectRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px;
      border-top: 1px solid var(--separator);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 52px;
    }
    
    .selectRow:active { background: rgba(127,127,127,.12); }

    .senderOptions {
      overflow: hidden;
      transition: all 0.35s;
      max-height: 0;
      opacity: 0;
    }
    
    .senderOptions.expanded {
      max-height: 350px;
      opacity: 1;
    }

    .check {
      width: 24px; height: 24px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.2);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      transition: all 0.25s;
    }
    .check.on {
      border-color: var(--accent);
      background: var(--accent);
    }
    .check.on:after { content:"✓"; color: #fff; font-size: 14px; font-weight: 700; }

    .buyBar {
      position: sticky;
      bottom: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: color-mix(in oklab, var(--section) 92%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--separator);
      z-index: 10;
    }
    .buyBtn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      font-weight: 700;
      font-size: 17px;
      background: var(--accent);
      color: var(--accentText);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .buyBtn:active { transform: scale(0.98); opacity: 0.9; }

    /* === КЕЙСЫ === */
    .caseGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .caseCard {
      background: linear-gradient(145deg, rgba(127,127,127,.12), rgba(127,127,127,.04));
      border: 1px solid var(--separator);
      border-radius: 20px;
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      animation: scaleIn 0.4s ease-out backwards;
      position: relative;
      overflow: hidden;
    }

    .caseCard::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(60deg, transparent 40%, rgba(255,255,255,.04) 50%, transparent 60%);
      animation: shimmer 4s infinite linear;
    }

    .caseCard:nth-child(1) { animation-delay: 0.05s; }
    .caseCard:nth-child(2) { animation-delay: 0.12s; }
    .caseCard:nth-child(3) { animation-delay: 0.19s; }
    .caseCard:nth-child(4) { animation-delay: 0.26s; }

    .caseCard:active { transform: scale(0.96); }

    .caseCard.free {
      background: linear-gradient(145deg, rgba(48, 209, 88, 0.18), rgba(48, 209, 88, 0.04));
      border-color: rgba(48, 209, 88, 0.25);
    }

    .caseCard.premium {
      background: linear-gradient(145deg, rgba(142, 131, 255, 0.18), rgba(142, 131, 255, 0.04));
      border-color: rgba(142, 131, 255, 0.25);
    }

    .caseCard.rich {
      background: linear-gradient(145deg, rgba(255, 214, 10, 0.18), rgba(255, 214, 10, 0.04));
      border-color: rgba(255, 214, 10, 0.25);
    }

    .caseCard.ultra {
      background: linear-gradient(145deg, rgba(255, 69, 58, 0.22), rgba(175, 82, 222, 0.22));
      border-color: rgba(255, 69, 58, 0.3);
      animation: glow 3s infinite ease-in-out;
    }

    .caseIcon {
      width: 52px;
      height: 52px;
      position: relative;
      z-index: 1;
      animation: float 3s infinite ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .caseIcon svg { width: 100%; height: 100%; }

    .caseName {
      font-weight: 700;
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    .casePrice {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      font-weight: 700;
      font-size: 14px;
      position: relative;
      z-index: 1;
      color: var(--starColor);
    }

    .caseCard.free .casePrice { color: var(--success); }

    .caseCard.disabled { opacity: 0.45; pointer-events: none; }

    .cooldown {
      font-size: 12px;
      color: var(--subtext);
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .creditBadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(90, 200, 250, 0.15);
      border: 1px solid rgba(90, 200, 250, 0.3);
      font-weight: 600;
      font-size: 11px;
      color: var(--creditColor);
      position: relative;
      z-index: 1;
      animation: pulse 2s infinite ease-in-out;
    }

    /* Jackpot Badge на карточке кейса */
    .jackpotBadge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.3), rgba(255, 214, 10, 0.3));
      border: 1px solid rgba(255, 107, 53, 0.5);
      font-weight: 700;
      font-size: 12px;
      color: var(--jackpotGold);
      position: relative;
      z-index: 1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      animation: pulse 1.5s infinite;
    }

    /* === РУЛЕТКА === */
    .rouletteOverlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.3s ease-out;
    }

    .rouletteOverlay.hidden { display: none; }

    /* Конфетти */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
      animation: confettiDrop 3s linear forwards;
    }

    .rouletteContainer {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border-radius: 28px;
      padding: 24px;
      border: 2px solid var(--separator);
      box-shadow: 0 32px 100px rgba(0,0,0,.6);
      animation: scaleIn 0.35s ease-out;
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .rouletteContainer.jackpot {
      animation: jackpotGlow 1s infinite ease-in-out;
    }

    .rouletteContainer.jackpot::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      border: 3px solid transparent;
      animation: rainbowBorder 2s linear infinite;
      pointer-events: none;
    }

    .rouletteTitle {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Мультипликатор перед стартом */
    .multiplierPreview {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.15), rgba(255, 214, 10, 0.15));
      border-radius: 16px;
      border: 1px solid rgba(255, 107, 53, 0.3);
      animation: slideDown 0.5s ease-out;
    }

    .multiplierPreview.show { display: flex; }

    .multiplierPreview .label {
      font-size: 14px;
      color: var(--subtext);
      font-weight: 600;
    }

    .multiplierValue {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--jackpotColor), var(--jackpotGold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: multiplierPop 0.6s ease-out;
      text-shadow: none;
    }

    .rouletteWindow {
      position: relative;
      height: 100px;
      overflow: hidden;
      border-radius: 20px;
      background: rgba(0,0,0,.35);
    }

    .rouletteWindow::before,
    .rouletteWindow::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 2;
      pointer-events: none;
    }

    .rouletteWindow::before {
      left: 0;
      background: linear-gradient(to right, var(--card), transparent);
    }

    .rouletteWindow::after {
      right: 0;
      background: linear-gradient(to left, var(--card), transparent);
    }

    .roulettePointer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: calc(100% - 12px);
      border: 2.5px solid var(--accent);
      border-radius: 16px;
      background: rgba(142, 131, 255, 0.12);
      z-index: 3;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(142, 131, 255, 0.25);
      transition: all 0.3s ease;
    }

    .roulettePointer.jackpot {
      border-color: var(--jackpotColor);
      background: rgba(255, 107, 53, 0.2);
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
      animation: jackpotGlow 0.5s infinite;
    }

    .rouletteStrip {
      display: flex;
      flex-direction: row;
      transition: transform 5s cubic-bezier(0.12, 0.8, 0.3, 1);
      height: 100%;
      align-items: center;
    }

    .rouletteItem {
      width: 90px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rouletteItem img {
      height: 70px;
      width: 70px;
      object-fit: contain;
    }
    
    .rouletteItem svg {
      height: 60px;
      width: 60px;
    }

    .rouletteResult {
      text-align: center;
      margin-top: 24px;
      font-size: 20px;
      font-weight: 700;
      min-height: 30px;
    }

    .rouletteResult.win { color: var(--success); }
    .rouletteResult.lose { color: var(--subtext); }
    .rouletteResult.jackpot { 
      font-size: 24px;
      color: var(--jackpotGold); 
      animation: jackpotText 0.5s infinite ease-in-out;
    }

    /* Выигранные подарки при джекпоте */
    .wonGiftsDisplay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.12), rgba(255, 214, 10, 0.12));
      border-radius: 20px;
      border: 1px solid rgba(255, 107, 53, 0.25);
      animation: slideDown 0.5s ease-out;
    }

    .wonGiftsDisplay.show { display: flex; }

    .wonGiftsTitle {
      font-size: 14px;
      color: var(--subtext);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .wonGiftsGrid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .wonGiftItem {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px;
      background: rgba(0,0,0,.25);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.1);
      animation: bounceIn 0.5s ease-out backwards;
      min-width: 80px;
    }

    .wonGiftItem:nth-child(1) { animation-delay: 0.1s; }
    .wonGiftItem:nth-child(2) { animation-delay: 0.25s; }
    .wonGiftItem:nth-child(3) { animation-delay: 0.4s; }

    .wonGiftItem img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .wonGiftItem .name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .wonGiftItem .countBadge {
      font-size: 11px;
      font-weight: 700;
      color: var(--jackpotGold);
      padding: 2px 8px;
      background: rgba(255, 214, 10, 0.2);
      border-radius: 999px;
    }

    .rouletteClose {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accentText);
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .rouletteClose:active { transform: scale(0.98); opacity: 0.9; }

    .rouletteClose.jackpot {
      background: linear-gradient(135deg, var(--jackpotColor), var(--jackpotGold));
      color: #000;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div class="app">
    <div class="sheet">
      <div class="panel">

        <div id="screenCatalog">
          <div class="topbar">
            <button class="back" style="visibility:hidden">←</button>
            <div class="title">#подарочница</div>
            <div class="ghost"></div>
          </div>

          <div class="content">
            <div class="tabs">
              <button class="tab active" id="tabGifts"></button>
              <button class="tab" id="tabLuck"></button>
            </div>

            <div id="sectionGifts">
              <div class="inset">
                <div class="insetHeader">Выбери подарок</div>
                <div id="giftGrid" class="grid"></div>
              </div>
            </div>

            <div id="sectionLuck" class="hidden">
              <div class="inset">
                <div class="insetHeader">Испытай удачу</div>
                <div class="caseGrid" id="caseGrid"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="screenDetails" class="hidden">
          <div class="topbar">
            <button id="btnBack" class="back">← Назад</button>
            <div class="title" id="detailsTitle">Подарок</div>
            <div class="ghost"></div>
          </div>

          <div class="content">
            <div class="preview">
              <img id="detailsGif" alt="gift" />
            </div>

            <div style="height:14px"></div>

            <div class="inset">
              <div class="toggleRow" id="toggleSignature">
                <div>
                  <div style="font-weight:700; font-size: 16px;">Добавить подпись</div>
                  <div class="muted">от +2 ⭐ к стоимости</div>
                </div>
                <div class="toggle" id="signatureToggle"></div>
              </div>

              <div id="senderOptions" class="senderOptions">
                <div class="insetHeader" style="border-top: 1px solid var(--separator); padding-top: 14px;">Подписать от</div>
              
                <div id="optFree" class="selectRow">
                  <div>
                    <div style="font-weight:600; font-size: 16px;">@echoaxxs</div>
                    <div class="muted">+2 ⭐</div>
                  </div>
                  <div class="check on" id="checkFree"></div>
                </div>
              
                <div id="optPaid" class="selectRow">
                  <div>
                    <div style="font-weight:600; font-size: 16px;">@bogclm</div>
                    <div class="muted">+2 ⭐</div>
                  </div>
                  <div class="check" id="checkPaid"></div>
                </div>
              
                <div id="optBoth" class="selectRow">
                  <div>
                    <div style="font-weight:600; font-size: 16px;">@bogclm и @echoaxxs</div>
                    <div class="muted">+5 ⭐</div>
                  </div>
                  <div class="check" id="checkBoth"></div>
                </div>
              </div>

              <div class="row">
                <div class="muted">Итого</div>
                <div class="right" id="detailsTotal">—</div>
              </div>
            </div>
          </div>

          <div class="buyBar">
            <button id="btnBuy" class="buyBtn">Купить</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="rouletteOverlay" class="rouletteOverlay hidden">
    <div class="rouletteContainer" id="rouletteContainer">
      <div class="rouletteTitle" id="rouletteTitle">Открываем кейс...</div>
      
      <!-- Превью мультипликатора -->
      <div class="multiplierPreview" id="multiplierPreview">
        <div class="label">🔥 Мультипликатор</div>
        <div class="multiplierValue" id="multiplierValue">x2</div>
      </div>
      
      <div class="rouletteWindow">
        <div class="roulettePointer" id="roulettePointer"></div>
        <div class="rouletteStrip" id="rouletteStrip"></div>
      </div>
      
      <div class="rouletteResult" id="rouletteResult"></div>
      
      <!-- Выигранные подарки -->
      <div class="wonGiftsDisplay" id="wonGiftsDisplay">
        <div class="wonGiftsTitle">Ты выиграл</div>
        <div class="wonGiftsGrid" id="wonGiftsGrid"></div>
      </div>
      
      <button class="rouletteClose hidden" id="rouletteClose">Забрать</button>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  const API_BASE = "https://podarochnica-api.onrender.com";

  const FREE_SENDER = "@echoaxxs";
  const PAID_SENDER = "@bogclm";
  const BOTH_SENDER = "@bogclm и @echoaxxs";
  
  const SIGNATURE_COSTS = {
    "@echoaxxs": 2,
    "@bogclm": 2,
    "@bogclm и @echoaxxs": 5,
  };

  const ICONS = {
    star: `<svg class="star" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD60A" stroke="#FFB800" stroke-width="1"/></svg>`,
    gift: `<svg viewBox="0 0 24 24" fill="none" width="20" height="20"><rect x="3" y="10" width="18" height="12" rx="2" fill="currentColor" opacity="0.9"/><rect x="3" y="10" width="18" height="3" fill="currentColor"/><rect x="10.5" y="10" width="3" height="12" fill="#FFE066"/><path d="M12 10C12 10 9 7 9 5C9 3 10.5 2 12 4C13.5 2 15 3 15 5C15 7 12 10 12 10Z" fill="currentColor" stroke="currentColor" stroke-width="1"/><rect x="4" y="6" width="16" height="4" rx="1" fill="currentColor" opacity="0.8"/><rect x="10.5" y="6" width="3" height="4" fill="#FFE066"/></svg>`,
    dice: `<svg viewBox="0 0 24 24" fill="none" width="20" height="20"><rect x="2" y="2" width="20" height="20" rx="4" fill="currentColor" opacity="0.9"/><circle cx="7" cy="7" r="2" fill="white"/><circle cx="12" cy="12" r="2" fill="white"/><circle cx="17" cy="17" r="2" fill="white"/><circle cx="17" cy="7" r="2" fill="white"/><circle cx="7" cy="17" r="2" fill="white"/></svg>`,
    box: `<svg viewBox="0 0 48 48" fill="none"><path d="M4 16L24 6L44 16V36L24 46L4 36V16Z" fill="#4ECDC4"/><path d="M24 6L44 16L24 26L4 16L24 6Z" fill="#7DE8E1"/><path d="M24 26V46L4 36V16L24 26Z" fill="#3DB9B1"/><path d="M24 26V46L44 36V16L24 26Z" fill="#44C4BC"/></svg>`,
    diamond: `<svg viewBox="0 0 48 48" fill="none"><path d="M24 4L42 18L24 44L6 18L24 4Z" fill="#A78BFA"/><path d="M24 4L6 18H42L24 4Z" fill="#C4B5FD"/><path d="M6 18L24 44L24 18H6Z" fill="#8B5CF6"/><path d="M42 18L24 44V18H42Z" fill="#9F7AEA"/><path d="M14 18L24 4L34 18H14Z" fill="#DDD6FE"/></svg>`,
    money: `<svg viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="26" rx="18" ry="14" fill="#34D399"/><ellipse cx="24" cy="22" rx="18" ry="14" fill="#6EE7B7"/><ellipse cx="24" cy="22" rx="14" ry="10" fill="#34D399"/><text x="24" y="27" text-anchor="middle" fill="white" font-size="16" font-weight="bold">$</text></svg>`,
    fire: `<svg viewBox="0 0 48 48" fill="none"><path d="M24 4C24 4 12 16 12 28C12 36 17 44 24 44C31 44 36 36 36 28C36 16 24 4 24 4Z" fill="#FF6B35"/><path d="M24 16C24 16 18 22 18 30C18 36 21 40 24 40C27 40 30 36 30 30C30 22 24 16 24 16Z" fill="#FFD93D"/><path d="M24 26C24 26 21 30 21 34C21 37 22.5 39 24 39C25.5 39 27 37 27 34C27 30 24 26 24 26Z" fill="#FFF"/></svg>`,
    nothing: `<svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="#666" stroke-width="3" fill="none"/><line x1="12" y1="12" x2="36" y2="36" stroke="#666" stroke-width="3"/></svg>`,
    ticket: `<svg viewBox="0 0 24 24" fill="none"><path d="M2 9V6a2 2 0 012-2h16a2 2 0 012 2v3" stroke="currentColor" stroke-width="2"/><path d="M2 15v3a2 2 0 002 2h16a2 2 0 002-2v-3" stroke="currentColor" stroke-width="2"/><path d="M22 9a3 3 0 00-3 3 3 3 0 003 3" stroke="currentColor" stroke-width="2"/><path d="M2 9a3 3 0 013 3 3 3 0 01-3 3" stroke="currentColor" stroke-width="2"/><line x1="10" y1="8" x2="10" y2="16" stroke="currentColor" stroke-width="2" stroke-dasharray="2 2"/></svg>`
  };

  const GIFTS = [
    { id: "brilliant_ring", title: "Колечко", price: 100, gif_url: "/brilliant_ring.gif"},
    { id: "heroic_cup", title: "Кубок", price: 100, gif_url: "/heroic_cup.gif"},
    { id: "diamond", title: "Алмаз", price: 100, gif_url: "/diamond.gif"},
    { id: "flowers_bouquet", title: "Букет", price: 50, gif_url: "/bouquet_flowers.gif"},
    { id: "cupcake", title: "Тортик", price: 50, gif_url: "/cupcake.gif"},
    { id: "wine", title: "Вино", price: 50, gif_url: "/wine.gif"},
    { id: "rocket", title: "Ракета", price: 50, gif_url: "/rocket.gif"},
    { id: "rose", title: "Роза", price: 25, gif_url: "/rose.gif" },
    { id: "box", title: "Подарок", price: 25, gif_url: "/gift.gif" },
    { id: "heart", title: "Сердце", price: 15, gif_url: "/heart.gif" },
    { id: "bear", title: "Мишка", price: 15, gif_url: "/bear.gif"},
  ];

  const CASES = [
    { 
      id: "weekly", 
      name: "Еженедельный", 
      price: 0, 
      priceText: "Бесплатно", 
      type: "free", 
      drops: ["rose", "box", "heart", "bear"],
      nothingChance: 1.0,
      nothingOnStrip: 0.55
    },
    { 
      id: "premium", 
      name: "Премиум", 
      price: 30, 
      priceText: "30", 
      type: "premium", 
      drops: ["rose", "box", "rocket"],
      nothingChance: 0.3,
      nothingOnStrip: 0.2
    },
    { 
      id: "rich", 
      name: "Богач", 
      price: 100, 
      priceText: "100", 
      type: "rich", 
      drops: ["rose", "box", "brilliant_ring", "rocket"],
      nothingChance: 0.15,
      nothingOnStrip: 0.1
    },
    { 
      id: "ultra", 
      name: "Ультра", 
      price: 500, 
      priceText: "500", 
      type: "ultra", 
      drops: ["brilliant_ring", "diamond", "heroic_cup"],
      nothingChance: 0.05,
      nothingOnStrip: 0.03,
      multiplier: {
        enabled: true,
        chances: [
          { count: 1, chance: 0.70 },
          { count: 2, chance: 0.22 },
          { count: 3, chance: 0.08 },
        ]
      }
    },
  ];

  const CASE_ICONS = {
    free: ICONS.box,
    premium: ICONS.diamond,
    rich: ICONS.money,
    ultra: ICONS.fire
  };

  let selectedGift = null;
  let sender = FREE_SENDER;
  let addSignature = false;
  let weeklyUsed = localStorage.getItem('weeklyUsed') || null;
  let userCredits = { cases: {}, gifts: {} };
  let isInitialized = false;

  function setVar(name, val) { 
    if (val) document.documentElement.style.setProperty(name, val);
  }

  function applyTheme() {
    if (!tg) return;
    const p = tg.themeParams || {};
    setVar("--bg", p.bg_color || p.secondary_bg_color);
    setVar("--section", p.secondary_bg_color || p.section_bg_color || p.bg_color);
    setVar("--card", p.section_bg_color || p.secondary_bg_color || p.bg_color);
    setVar("--text", p.text_color);
    setVar("--subtext", p.subtitle_text_color || p.hint_color);
    setVar("--hint", p.hint_color);
    setVar("--accent", p.button_color || p.link_color);
    setVar("--accentText", p.button_text_color);
    setVar("--danger", p.destructive_text_color);
    
    try {
      if (typeof tg.setBackgroundColor === 'function') {
        tg.setBackgroundColor(p.bg_color || "#0b0b0f");
      }
      if (typeof tg.setHeaderColor === 'function') {
        tg.setHeaderColor(p.secondary_bg_color || "#0b0b0f");
      }
    } catch (e) {}
  }

  async function safeFetch(url, options = {}) {
    const maxRetries = 2;
    let lastError;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response;
      } catch (error) {
        lastError = error;
        if (attempt < maxRetries) await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
    throw lastError;
  }

  async function loadCredits() {
    if (!tg?.initData || !API_BASE) return;
    try {
      const resp = await safeFetch(`${API_BASE}/api/get-credits`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData })
      });
      userCredits = await resp.json() || { cases: {}, gifts: {} };
      if (!document.getElementById("sectionLuck").classList.contains("hidden")) renderCases();
    } catch (e) {
      userCredits = { cases: {}, gifts: {} };
    }
  }

  async function useCreditAPI(itemType, itemId) {
    if (!tg?.initData || !API_BASE) {
      const category = itemType === "case" ? "cases" : "gifts";
      if (userCredits[category]?.[itemId] > 0) {
        userCredits[category][itemId]--;
        return true;
      }
      return false;
    }
    try {
      const resp = await safeFetch(`${API_BASE}/api/use-credit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData, itemType, itemId })
      });
      const result = await resp.json();
      if (result.success) {
        const category = itemType === "case" ? "cases" : "gifts";
        if (userCredits[category]?.[itemId]) userCredits[category][itemId]--;
        return true;
      }
      return false;
    } catch (e) {
      return false;
    }
  }

  function getCaseCredits(caseId) { return userCredits.cases?.[caseId] || 0; }

  function isWeeklyAvailable() {
    if (!weeklyUsed) return true;
    return (new Date() - new Date(weeklyUsed)) >= 7 * 24 * 60 * 60 * 1000;
  }

  function getWeeklyCooldown() {
    if (!weeklyUsed || isWeeklyAvailable()) return null;
    const diff = new Date(new Date(weeklyUsed).getTime() + 7 * 24 * 60 * 60 * 1000) - new Date();
    const days = Math.floor(diff / (24 * 60 * 60 * 1000));
    const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
    return days > 0 ? `${days}д ${hours}ч` : `${hours}ч`;
  }

  // Мультипликатор
  function rollMultiplier(caseData) {
    const multiplier = caseData.multiplier;
    if (!multiplier || !multiplier.enabled) return 1;
    
    const roll = Math.random();
    let cumulative = 0;
    
    for (const option of multiplier.chances) {
      cumulative += option.chance;
      if (roll < cumulative) return option.count;
    }
    return 1;
  }

  function rollCaseGifts(caseData, count) {
    const caseGifts = caseData.drops.map(id => GIFTS.find(g => g.id === id)).filter(Boolean);
    const nothingChance = caseData.nothingChance || 0.5;
    const results = [];
    
    for (let i = 0; i < count; i++) {
      const adjustedNothingChance = count > 1 ? nothingChance * 0.3 : nothingChance;
      
      if (Math.random() < adjustedNothingChance && count === 1) {
        results.push(null);
      } else {
        results.push(caseGifts[Math.floor(Math.random() * caseGifts.length)]);
      }
    }
    
    const realGifts = results.filter(g => g !== null);
    return realGifts.length > 0 ? realGifts : [null];
  }

  // Конфетти
  function spawnConfetti() {
    const overlay = document.getElementById("rouletteOverlay");
    const colors = ['#FF6B35', '#FFD93D', '#FF453A', '#30D158', '#5AC8FA', '#AF52DE'];
    
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-20px';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 2 + 's';
      confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
      confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      confetti.style.width = (6 + Math.random() * 8) + 'px';
      confetti.style.height = (6 + Math.random() * 8) + 'px';
      overlay.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 4000);
    }
  }

  function initTabs() {
    document.getElementById("tabGifts").innerHTML = `${ICONS.gift}<span>Подарки</span>`;
    document.getElementById("tabLuck").innerHTML = `${ICONS.dice}<span>Удача</span>`;
  }

  function renderGrid() {
    const grid = document.getElementById("giftGrid");
    if (!grid) return;
    grid.innerHTML = "";
    GIFTS.forEach((g, i) => {
      const el = document.createElement("div");
      el.className = "giftCard";
      el.style.animationDelay = `${i * 0.05}s`;
      el.innerHTML = `
        <div class="giftImg"><img src="${g.gif_url}" alt="${g.title}" loading="lazy"></div>
        <div class="pricePill">${ICONS.star}${g.price}</div>
      `;
      el.onclick = () => openDetails(g);
      grid.appendChild(el);
    });
  }

  function renderCases() {
    const grid = document.getElementById("caseGrid");
    if (!grid) return;
    grid.innerHTML = "";
    
    CASES.forEach((c, i) => {
      const isWeekly = c.id === "weekly";
      const available = !isWeekly || isWeeklyAvailable();
      const cooldown = isWeekly ? getWeeklyCooldown() : null;
      const credits = getCaseCredits(c.id);
      const hasCredit = credits > 0;
      const hasMultiplier = c.multiplier && c.multiplier.enabled;
      
      const el = document.createElement("div");
      el.className = `caseCard ${c.type}${!available && !hasCredit ? ' disabled' : ''}${hasCredit ? ' hasCredit' : ''}`;
      el.style.animationDelay = `${i * 0.07}s`;
      
      const priceContent = c.price === 0 ? c.priceText : `${ICONS.star}${c.priceText}`;
      const creditBadge = hasCredit ? `<div class="creditBadge">${ICONS.ticket} ${credits}</div>` : '';
      const jackpotBadge = hasMultiplier ? `<div class="jackpotBadge">🔥 до x3</div>` : '';
      
      el.innerHTML = `
        <div class="caseIcon">${CASE_ICONS[c.type]}</div>
        <div class="caseName">${c.name}</div>
        <div class="casePrice">${priceContent}</div>
        ${jackpotBadge}
        ${creditBadge}
        ${cooldown && !hasCredit ? `<div class="cooldown">Через ${cooldown}</div>` : ''}
      `;
      
      if (available || hasCredit) el.onclick = () => openCase(c, hasCredit);
      grid.appendChild(el);
    });
  }

  function openDetails(g) {
    selectedGift = g;
    sender = FREE_SENDER;
    addSignature = false;
    document.getElementById("screenCatalog").classList.add("hidden");
    document.getElementById("screenDetails").classList.remove("hidden");
    document.getElementById("detailsTitle").textContent = g.title;
    document.getElementById("detailsGif").src = g.gif_url;
    document.getElementById("signatureToggle").classList.remove("on");
    document.getElementById("senderOptions").classList.remove("expanded");
    syncSenderUI();
    updateTotalUI();
  }

  function closeDetails() {
    document.getElementById("screenDetails").classList.add("hidden");
    document.getElementById("screenCatalog").classList.remove("hidden");
  }

  function syncSenderUI() {
    document.getElementById("checkFree").classList.toggle("on", sender === FREE_SENDER);
    document.getElementById("checkPaid").classList.toggle("on", sender === PAID_SENDER);
    document.getElementById("checkBoth").classList.toggle("on", sender === BOTH_SENDER);
  }

  function totalPrice() {
    if (!selectedGift) return 0;
    if (!addSignature) return selectedGift.price;
    return selectedGift.price + (SIGNATURE_COSTS[sender] || 2);
  }

  function updateTotalUI() {
    const t = totalPrice();
    document.getElementById("detailsTotal").innerHTML = `${ICONS.star} ${t}`;
    document.getElementById("btnBuy").innerHTML = `Купить за ${ICONS.star} ${t}`;
  }

  async function openCase(caseData, useCreditFlag = false) {
    const isWeekly = caseData.id === "weekly";
    const isPaid = caseData.price > 0 && !useCreditFlag;

    if (isPaid) {
      if (!tg?.initData || !API_BASE) {
        alert(`Тест: Покупка ${caseData.name} за ${caseData.price}⭐`);
        showRoulette(caseData, false);
        return;
      }
      try {
        const resp = await safeFetch(`${API_BASE}/api/create-invoice`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData: tg.initData, caseId: caseData.id })
        });
        const data = await resp.json();
        if (data.link) {
          tg.openInvoice(data.link, (status) => {
            if (status === "paid") showRoulette(caseData, false);
          });
        } else {
          alert("Не удалось создать счёт");
        }
        return;
      } catch (e) {
        alert("Ошибка: " + e.message);
        return;
      }
    }

    if (useCreditFlag) {
      const success = await useCreditAPI("case", caseData.id);
      if (!success) { alert("Не удалось использовать кредит"); return; }
    }

    showRoulette(caseData, isWeekly);
  }

  function showRoulette(caseData, isWeekly) {
    const overlay = document.getElementById("rouletteOverlay");
    const container = document.getElementById("rouletteContainer");
    const strip = document.getElementById("rouletteStrip");
    const title = document.getElementById("rouletteTitle");
    const result = document.getElementById("rouletteResult");
    const closeBtn = document.getElementById("rouletteClose");
    const pointer = document.getElementById("roulettePointer");
    const multiplierPreview = document.getElementById("multiplierPreview");
    const multiplierValue = document.getElementById("multiplierValue");
    const wonGiftsDisplay = document.getElementById("wonGiftsDisplay");
    const wonGiftsGrid = document.getElementById("wonGiftsGrid");

    // Reset
    overlay.classList.remove("hidden");
    container.classList.remove("jackpot");
    pointer.classList.remove("jackpot");
    closeBtn.classList.remove("jackpot");
    multiplierPreview.classList.remove("show");
    wonGiftsDisplay.classList.remove("show");
    
    title.textContent = `${caseData.name} кейс`;
    result.textContent = "";
    result.className = "rouletteResult";
    closeBtn.classList.add("hidden");

    // Мультипликатор
    const giftCount = rollMultiplier(caseData);
    const isJackpot = giftCount > 1;
    
    console.log(`🎰 Мультипликатор: x${giftCount}`);

    // Показываем превью мультипликатора
    if (isJackpot) {
      multiplierValue.textContent = `x${giftCount}`;
      multiplierPreview.classList.add("show");
      
      // Добавляем небольшую задержку для эффекта
      setTimeout(() => {
        container.classList.add("jackpot");
        pointer.classList.add("jackpot");
      }, 600);
    }

    // Получаем выигранные подарки
    const wonGifts = rollCaseGifts(caseData, giftCount);
    const hasRealWin = wonGifts.some(g => g !== null);
    
    console.log(`🎁 Выигрыш:`, wonGifts);

    // Строим ленту рулетки
    const nothingItem = { id: "nothing", title: "Ничего", isNothing: true };
    const items = [];
    const nothingOnStrip = caseData.nothingOnStrip || 0.25;
    const caseGifts = caseData.drops.map(id => GIFTS.find(g => g.id === id)).filter(Boolean);
    
    for (let i = 0; i < 50; i++) {
      if (Math.random() < nothingOnStrip) {
        items.push(nothingItem);
      } else {
        items.push(caseGifts[Math.floor(Math.random() * caseGifts.length)]);
      }
    }

    const winIndex = isWeekly ? 38 : 35;
    
    const displayItem = hasRealWin ? wonGifts.find(g => g !== null) : nothingItem;
    items[winIndex] = displayItem.isNothing ? nothingItem : displayItem;

    if (!isWeekly && hasRealWin) {
      for (let offset of [-2, -1, 1, 2]) {
        if (Math.random() > 0.5) {
          items[winIndex + offset] = caseGifts[Math.floor(Math.random() * caseGifts.length)];
        }
      }
    }

    strip.innerHTML = items.map(item => {
      if (item.isNothing) return `<div class="rouletteItem">${ICONS.nothing}</div>`;
      return `<div class="rouletteItem"><img src="${item.gif_url}" alt="${item.title}"></div>`;
    }).join("");

    strip.style.transition = "none";
    strip.style.transform = "translateX(0)";

    const containerWidth = document.querySelector('.rouletteWindow').offsetWidth;
    const itemWidth = 90;
    const centerOffset = (containerWidth / 2) - (itemWidth / 2);

    const startDelay = isJackpot ? 800 : 100;

    setTimeout(() => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          strip.style.transition = "transform 5s cubic-bezier(0.12, 0.8, 0.3, 1)";
          strip.style.transform = `translateX(-${(winIndex * itemWidth) - centerOffset}px)`;
        });
      });
    }, startDelay);

    const resultDelay = 5500 + startDelay;

    setTimeout(() => {
      if (!hasRealWin) {
        result.textContent = "Ничего не выпало...";
        result.classList.add("lose");
        multiplierPreview.classList.remove("show");
      } else if (isJackpot) {
        // ДЖЕКПОТ!
        spawnConfetti();
        
        result.innerHTML = `🔥 ДЖЕКПОТ x${giftCount}! 🔥`;
        result.classList.add("jackpot");
        closeBtn.classList.add("jackpot");
        
        // Показываем все выигранные подарки
        wonGiftsGrid.innerHTML = "";
        
        // Группируем одинаковые подарки
        const giftCounts = {};
        wonGifts.filter(g => g).forEach(g => {
          giftCounts[g.id] = (giftCounts[g.id] || 0) + 1;
        });
        
        Object.entries(giftCounts).forEach(([giftId, count]) => {
          const gift = GIFTS.find(g => g.id === giftId);
          if (gift) {
            const giftEl = document.createElement("div");
            giftEl.className = "wonGiftItem";
            giftEl.innerHTML = `
              <img src="${gift.gif_url}" alt="${gift.title}">
              <div class="name">${gift.title}</div>
              ${count > 1 ? `<div class="countBadge">x${count}</div>` : ''}
            `;
            wonGiftsGrid.appendChild(giftEl);
          }
        });
        
        wonGiftsDisplay.classList.add("show");
      } else {
        const winItem = wonGifts[0];
        result.textContent = `Выпало: ${winItem.title}!`;
        result.classList.add("win");
      }
      
      if (isWeekly) {
        weeklyUsed = new Date().toISOString();
        localStorage.setItem('weeklyUsed', weeklyUsed);
      }
      
      closeBtn.classList.remove("hidden");
      closeBtn.textContent = !hasRealWin ? "Закрыть" : (isJackpot ? "🔥 Забрать всё!" : "Забрать");
    }, resultDelay);
  }

  // События
  document.getElementById("tabGifts").onclick = () => {
    document.getElementById("tabGifts").classList.add("active");
    document.getElementById("tabLuck").classList.remove("active");
    document.getElementById("sectionGifts").classList.remove("hidden");
    document.getElementById("sectionLuck").classList.add("hidden");
    renderGrid();
  };

  document.getElementById("tabLuck").onclick = () => {
    document.getElementById("tabLuck").classList.add("active");
    document.getElementById("tabGifts").classList.remove("active");
    document.getElementById("sectionLuck").classList.remove("hidden");
    document.getElementById("sectionGifts").classList.add("hidden");
    renderCases();
  };

  document.getElementById("toggleSignature").onclick = () => {
    addSignature = !addSignature;
    document.getElementById("signatureToggle").classList.toggle("on", addSignature);
    document.getElementById("senderOptions").classList.toggle("expanded", addSignature);
    updateTotalUI();
  };

  document.getElementById("optFree").onclick = () => { sender = FREE_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("optPaid").onclick = () => { sender = PAID_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("optBoth").onclick = () => { sender = BOTH_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("btnBack").onclick = closeDetails;

  document.getElementById("btnBuy").onclick = async () => {
    const t = totalPrice();
    if (!tg?.initData || !API_BASE) {
      alert(`Тест: ${selectedGift.title}${addSignature ? `\nПодпись: от ${sender}` : ''}\nИтого: ${t}⭐`);
      return;
    }
    try {
      const resp = await safeFetch(`${API_BASE}/api/create-invoice`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ initData: tg.initData, giftId: selectedGift.id, sender: addSignature ? sender : null })
      });
      const data = await resp.json();
      if (data.link) {
        tg.openInvoice(data.link, (status) => { if (status === "paid") tg.close(); });
      } else {
        alert("Не удалось создать счёт");
      }
    } catch (e) {
      alert("Ошибка: " + e.message);
    }
  };

  document.getElementById("rouletteClose").onclick = () => {
    document.getElementById("rouletteOverlay").classList.add("hidden");
    document.getElementById("rouletteContainer").classList.remove("jackpot");
    document.getElementById("multiplierPreview").classList.remove("show");
    document.getElementById("wonGiftsDisplay").classList.remove("show");
    
    // Удаляем конфетти
    document.querySelectorAll('.confetti').forEach(el => el.remove());
    
    renderCases();
  };

  function init() {
    if (isInitialized) return;
    isInitialized = true;
    applyTheme();
    initTabs();
    renderGrid();
    loadCredits();
  }

  if (tg) {
    tg.ready();
    tg.expand();
    tg.onEvent("themeChanged", applyTheme);
    setTimeout(init, 100);
  } else {
    init();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(init, 150));
  } else {
    setTimeout(init, 150);
  }
</script>
</body>
</html>
