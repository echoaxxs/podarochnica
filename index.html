<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Подарки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* Telegram theme vars (fallbacks) */
    :root{
      --bg: #0b0b0f;
      --card: #1c1c1e;
      --section: #1c1c1e;
      --text: #ffffff;
      --subtext: rgba(255,255,255,.65);
      --hint: rgba(255,255,255,.55);
      --separator: rgba(255,255,255,.08);
      --accent: #8e83ff;             /* похожий на фиолетовый акцент */
      --accentText: #ffffff;
      --danger: #ff453a;

      --radius: 18px;                 /* iOS большие скругления */
      --radius2: 14px;
      --pad: 14px;
      --gap: 12px;
      --shadow: 0 16px 50px rgba(0,0,0,.35);
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                   system-ui, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      padding:
        calc(env(safe-area-inset-top) + 12px)
        12px
        calc(env(safe-area-inset-bottom) + 16px);
      display: flex;
      justify-content: center;
    }

    .sheet {
      width: 100%;
      max-width: 420px;
      background: color-mix(in oklab, var(--bg) 30%, transparent);
      border-radius: calc(var(--radius) + 6px);
      padding: 10px;
    }

    .panel {
      background: var(--section);
      border: 1px solid var(--separator);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Top bar (как “шапка” iOS) */
    .topbar {
      padding: 14px 14px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: color-mix(in oklab, var(--section) 86%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--separator);
      z-index: 5;
    }

    .topbar .back {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
      padding: 8px 10px;
      border-radius: 12px;
    }
    .topbar .back:active { background: rgba(127,127,127,.14); }

    .topbar .title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.2px;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    .topbar .ghost {
      width: 44px; /* баланс по ширине справа */
      height: 1px;
    }

    .content { padding: 14px; }

    .muted { color: var(--subtext); font-size: 13px; }

    /* “Inset grouped” sections */
    .inset {
      background: color-mix(in oklab, var(--card) 92%, transparent);
      border: 1px solid var(--separator);
      border-radius: var(--radius2);
      overflow: hidden;
    }

    .insetHeader {
      padding: 12px 12px 8px;
      font-size: 13px;
      color: var(--hint);
      font-weight: 700;
      letter-spacing: .2px;
      text-transform: none;
    }

    /* Segmented control */
    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px 10px 12px;
    }
    .seg button {
      border: 0;
      border-radius: 12px;
      padding: 10px 10px;
      background: rgba(127,127,127,.14);
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
    }
    .seg button.active {
      background: color-mix(in oklab, var(--accent) 65%, rgba(127,127,127,.14));
      color: var(--accentText);
    }
    .seg button:active { transform: scale(.99); }

    /* Gift grid */
    .grid {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .giftCard {
      background: rgba(127,127,127,.10);
      border: 1px solid var(--separator);
      border-radius: 16px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .giftCard:active { transform: scale(.99); }

    .giftImg {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .giftImg img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      display: block;
    }

    .pricePill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--separator);
      font-weight: 900;
      font-size: 13px;
      color: color-mix(in oklab, var(--accent) 80%, white);
    }

    .star {
      width: 14px; height: 14px; display: inline-block;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    /* Details */
    .preview {
      width: 100%;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      border: 1px solid var(--separator);
      overflow: hidden;
      display: grid;
      place-items: center;
    }
    .preview img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }

    .rows { margin-top: 10px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px;
      border-top: 1px solid var(--separator);
      font-size: 15px;
    }
    .row:first-child { border-top: 0; }
    .row .right { color: var(--subtext); font-weight: 700; }

    /* Radio-like selectors (iOS style) */
    .selectRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px;
      border-top: 1px solid var(--separator);
      cursor: pointer;
    }
    .selectRow:first-child { border-top: 0; }
    .check {
      width: 22px; height: 22px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .check.on {
      border-color: color-mix(in oklab, var(--accent) 70%, white);
      background: color-mix(in oklab, var(--accent) 50%, transparent);
    }
    .check.on:after{
      content:"";
      width: 10px; height: 10px;
      border-radius: 999px;
      background: color-mix(in oklab, var(--accent) 78%, white);
      box-shadow: 0 6px 14px rgba(0,0,0,.28);
    }

    /* Bottom buy bar */
    .buyBar {
      position: sticky;
      bottom: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: color-mix(in oklab, var(--section) 86%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--separator);
    }
    .buyBtn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 16px;
      font-weight: 900;
      letter-spacing: -0.2px;
      font-size: 15px;
      background: var(--accent);
      color: var(--accentText);
    }
    .buyBtn:active { transform: scale(.99); }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div class="app">
    <div class="sheet">
      <div class="panel">

        <!-- Screen: Catalog -->
        <div id="screenCatalog">
          <div class="topbar">
            <button class="back" style="visibility:hidden">←</button>
            <div class="title">Случайный подарок</div>
            <div class="ghost"></div>
          </div>

          <div class="content">
            <div class="inset">
              <div class="insetHeader">Выберите цену</div>
              <div class="seg">
                <button id="seg25" class="active">25 <span style="opacity:.9">⭐</span></button>
                <button id="seg50">50 <span style="opacity:.9">⭐</span></button>
              </div>
            </div>

            <div style="height:12px"></div>

            <div class="inset">
              <div class="insetHeader">Подарки</div>
              <div id="giftGrid" class="grid"></div>
            </div>

            <div style="height:12px"></div>
            <div class="muted">Тема и цвета берутся из Telegram. В браузере будут запасные цвета.</div>
          </div>
        </div>

        <!-- Screen: Details -->
        <div id="screenDetails" class="hidden">
          <div class="topbar">
            <button id="btnBack" class="back">← Назад</button>
            <div class="title" id="detailsTitle">Подарок</div>
            <div class="ghost"></div>
          </div>

          <div class="content">
            <div class="preview">
              <img id="detailsGif" alt="gift" />
            </div>

            <div style="height:12px"></div>

            <div class="inset">
              <div class="insetHeader">Подписать подарок от</div>

              <div id="optFree" class="selectRow">
                <div>
                  <div style="font-weight:800">@echoaxxs</div>
                  <div class="muted">Без доплаты</div>
                </div>
                <div class="check on" id="checkFree"></div>
              </div>

              <div id="optPaid" class="selectRow">
                <div>
                  <div style="font-weight:800">@bogclm</div>
                  <div class="muted">+1 ⭐ к стоимости</div>
                </div>
                <div class="check" id="checkPaid"></div>
              </div>

              <div class="row">
                <div class="muted">Итого</div>
                <div class="right" id="detailsTotal">—</div>
              </div>
            </div>
          </div>

          <div class="buyBar">
            <button id="btnBuy" class="buyBtn">Купить</button>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;

  // Позже сюда поставишь URL твоего Worker API, например:
  // const API_BASE = "https://gift-api.ricka97.workers.dev";
  const API_BASE = "";

  const FREE_SENDER = "@echoaxxs";
  const PAID_SENDER = "@bogclm";
  const PAID_EXTRA = 1;

  // Меняй пути на свои GIF в /assets/
  const GIFTS = [
    { id: "rose",  title: "Роза",     price: 25, gif_url: "/assets/rose.gif" },
    { id: "box",   title: "Подарок",  price: 25, gif_url: "/assets/gift.gif" },
    { id: "heart", title: "Сердце",   price: 15, gif_url: "/assets/heart.gif" },
  ];

  // state
  let priceTier = 25;            // сегменты 25/50 (как в примере)
  let selectedGift = null;
  let sender = FREE_SENDER;

  // Small inline star svg
  const starSvg = `
    <svg class="star" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2.4l2.7 6.1 6.6.6-5 4.3 1.5 6.4L12 16.9 6.2 19.8l1.5-6.4-5-4.3 6.6-.6L12 2.4z"
        fill="currentColor" opacity="0.95"/>
    </svg>
  `;

  function setVar(name, val){ if(val) document.documentElement.style.setProperty(name, val); }

  function applyTheme(){
    if (!tg) return;
    const p = tg.themeParams || {};

    // Telegram gives colors like "#rrggbb"
    setVar("--bg", p.bg_color);
    setVar("--section", p.secondary_bg_color || p.section_bg_color);
    setVar("--card", p.section_bg_color || p.secondary_bg_color);
    setVar("--text", p.text_color);
    setVar("--subtext", p.subtitle_text_color || p.hint_color);
    setVar("--hint", p.hint_color);
    setVar("--accent", p.button_color || p.link_color);
    setVar("--accentText", p.button_text_color);
    setVar("--danger", p.destructive_text_color);

    try {
      tg.setBackgroundColor(p.bg_color || "#000000");
      tg.setHeaderColor(p.secondary_bg_color || p.bg_color || "#000000");
    } catch (e) {}
  }

  function renderGrid(){
    const grid = document.getElementById("giftGrid");
    grid.innerHTML = "";

    const filtered = GIFTS.map(g => ({
      ...g,
      price: (g.price === 25 || g.price === 50) ? priceTier : g.price
    }));

    filtered.forEach(g => {
      const el = document.createElement("div");
      el.className = "giftCard";
      el.innerHTML = `
        <div class="giftImg"><img src="${g.gif_url}" alt="${g.title}"></div>
        <div class="pricePill">${starSvg}${g.price}</div>
      `;
      el.onclick = () => openDetails(g);
      grid.appendChild(el);
    });
  }

  function openDetails(g){
    selectedGift = g;
    sender = FREE_SENDER;

    document.getElementById("screenCatalog").classList.add("hidden");
    document.getElementById("screenDetails").classList.remove("hidden");

    document.getElementById("detailsTitle").textContent = g.title;
    document.getElementById("detailsGif").src = g.gif_url;

    syncSenderUI();
    updateTotalUI();
  }

  function closeDetails(){
    document.getElementById("screenDetails").classList.add("hidden");
    document.getElementById("screenCatalog").classList.remove("hidden");
  }

  function syncSenderUI(){
    document.getElementById("checkFree").classList.toggle("on", sender === FREE_SENDER);
    document.getElementById("checkPaid").classList.toggle("on", sender === PAID_SENDER);
  }

  function totalPrice(){
    if(!selectedGift) return 0;
    const base = (selectedGift.price === 25 || selectedGift.price === 50) ? priceTier : selectedGift.price;
    const extra = (sender === PAID_SENDER) ? PAID_EXTRA : 0;
    return base + extra;
  }

  function updateTotalUI(){
    const t = totalPrice();
    document.getElementById("detailsTotal").textContent = `${t} ⭐`;
    document.getElementById("btnBuy").textContent = `Купить за ${t} ⭐`;
  }

  // Segmented buttons
  document.getElementById("seg25").onclick = () => {
    priceTier = 25;
    document.getElementById("seg25").classList.add("active");
    document.getElementById("seg50").classList.remove("active");
    renderGrid();
  };
  document.getElementById("seg50").onclick = () => {
    priceTier = 50;
    document.getElementById("seg50").classList.add("active");
    document.getElementById("seg25").classList.remove("active");
    renderGrid();
  };

  // Sender options (mutually exclusive)
  document.getElementById("optFree").onclick = () => {
    sender = FREE_SENDER;
    syncSenderUI(); updateTotalUI();
  };
  document.getElementById("optPaid").onclick = () => {
    sender = PAID_SENDER;
    syncSenderUI(); updateTotalUI();
  };

  document.getElementById("btnBack").onclick = closeDetails;

  // Buy
  document.getElementById("btnBuy").onclick = async () => {
    const t = totalPrice();

    // Пока API не подключён — просто тест
    if (!tg || !API_BASE) {
      alert(`Тест: ${selectedGift.title}\nПодпись: от ${sender}\nИтого: ${t}⭐\n\nПодключи Worker API для оплаты.`);
      return;
    }

    const resp = await fetch(`${API_BASE}/api/create-invoice`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        initData: tg.initData,
        giftId: selectedGift.id,
        sender
      })
    });

    if (!resp.ok) {
      alert("Не удалось создать инвойс");
      return;
    }
    const { link } = await resp.json();
    tg.openInvoice(link, (status) => {
      if (status === "paid") tg.close();
    });
  };

  // Telegram init
  if (tg) {
    tg.ready();
    tg.expand();
    applyTheme();
    tg.onEvent("themeChanged", applyTheme);
  }

  renderGrid();
</script>
</body>
</html>
