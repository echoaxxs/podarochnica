<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>#подарочница</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --card: #1a1a24;
      --card2: #22222e;
      --text: #ffffff;
      --text2: rgba(255,255,255,.7);
      --text3: rgba(255,255,255,.45);
      --border: rgba(255,255,255,.08);
      --accent: #7c6aff;
      --accent2: #9d8cff;
      --gold: #ffd700;
      --gold2: #ffaa00;
      --green: #00d26a;
      --red: #ff4757;
      --orange: #ff6b35;
      --cyan: #00d4ff;
      --pink: #ff6b9d;
      --purple: #a855f7;
      
      --radius: 20px;
      --radius2: 16px;
      --radius3: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* === АНИМАЦИИ === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(255, 107, 53, 0.4); }
      50% { box-shadow: 0 0 50px rgba(255, 107, 53, 0.7), 0 0 80px rgba(255, 215, 0, 0.3); }
    }

    @keyframes jackpotPulse {
      0%, 100% { 
        transform: scale(1);
        text-shadow: 0 0 20px var(--gold);
      }
      50% { 
        transform: scale(1.1);
        text-shadow: 0 0 40px var(--gold), 0 0 60px var(--orange);
      }
    }

    @keyframes multiplierBounce {
      0% { transform: scale(0) rotate(-10deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      70% { transform: scale(0.9) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes borderGlow {
      0%, 100% { border-color: var(--orange); }
      25% { border-color: var(--gold); }
      50% { border-color: var(--pink); }
      75% { border-color: var(--purple); }
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* === LAYOUT === */
    .app {
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px);
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    /* === HEADER === */
    .header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    }

    .header.with-back {
      justify-content: flex-start;
      gap: 12px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:active {
      transform: scale(0.95);
      background: var(--card2);
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent) 0%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }

    /* === TABS === */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      height: 52px;
      border-radius: var(--radius2);
      border: none;
      background: var(--card);
      color: var(--text3);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .tab::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tab.active {
      color: var(--text);
      box-shadow: 0 8px 32px rgba(124, 106, 255, 0.3);
    }

    .tab.active::before {
      opacity: 1;
    }

    .tab span, .tab svg {
      position: relative;
      z-index: 1;
    }

    .tab:active {
      transform: scale(0.98);
    }

    .tab svg {
      width: 20px;
      height: 20px;
    }

    /* === SECTIONS === */
    .section {
      padding: 0 16px;
      animation: fadeUp 0.4s ease-out;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      padding-left: 4px;
    }

    /* === GIFT GRID === */
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .gift-card {
      background: var(--card);
      border-radius: var(--radius2);
      padding: 14px 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
      animation: scaleIn 0.4s ease-out backwards;
    }

    .gift-card:nth-child(1) { animation-delay: 0.05s; }
    .gift-card:nth-child(2) { animation-delay: 0.1s; }
    .gift-card:nth-child(3) { animation-delay: 0.15s; }
    .gift-card:nth-child(4) { animation-delay: 0.2s; }
    .gift-card:nth-child(5) { animation-delay: 0.25s; }
    .gift-card:nth-child(6) { animation-delay: 0.3s; }

    .gift-card:active {
      transform: scale(0.96);
      border-color: var(--accent);
    }

    .gift-img {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(124,106,255,0.1), rgba(255,107,157,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gift-img img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    .gift-price {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: rgba(255, 215, 0, 0.1);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }

    .gift-price svg {
      width: 14px;
      height: 14px;
    }

    /* === CASE GRID === */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .case-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      animation: scaleIn 0.4s ease-out backwards;
    }

    .case-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: shimmer 3s infinite;
    }

    .case-card:nth-child(1) { animation-delay: 0.1s; }
    .case-card:nth-child(2) { animation-delay: 0.2s; }
    .case-card:nth-child(3) { animation-delay: 0.3s; }
    .case-card:nth-child(4) { animation-delay: 0.4s; }

    .case-card:active {
      transform: scale(0.97);
    }

    .case-card.free {
      background: linear-gradient(145deg, rgba(0, 210, 106, 0.12), var(--card));
      border-color: rgba(0, 210, 106, 0.3);
    }

    .case-card.premium {
      background: linear-gradient(145deg, rgba(124, 106, 255, 0.12), var(--card));
      border-color: rgba(124, 106, 255, 0.3);
    }

    .case-card.rich {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.12), var(--card));
      border-color: rgba(255, 215, 0, 0.3);
    }

    .case-card.ultra {
      background: linear-gradient(145deg, rgba(255, 107, 53, 0.15), rgba(168, 85, 247, 0.15));
      border-color: rgba(255, 107, 53, 0.4);
      animation: scaleIn 0.4s ease-out backwards, glow 2s infinite ease-in-out;
      animation-delay: 0.4s, 0s;
    }

    .case-card.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .case-icon {
      width: 64px;
      height: 64px;
      animation: float 4s ease-in-out infinite;
    }

    .case-icon svg {
      width: 100%;
      height: 100%;
    }

    .case-name {
      font-size: 17px;
      font-weight: 700;
    }

    .case-price {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
    }

    .case-card.free .case-price {
      color: var(--green);
    }

    .case-price svg {
      width: 15px;
      height: 15px;
    }

    .case-badge {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .case-badge.jackpot {
      background: linear-gradient(135deg, var(--orange), var(--gold));
      color: #000;
      animation: pulse 1.5s infinite;
    }

    .case-badge.credit {
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: var(--cyan);
    }

    .case-cooldown {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* === DETAIL SCREEN === */
    .detail-preview {
      margin: 0 16px 20px;
      border-radius: var(--radius);
      background: linear-gradient(145deg, var(--card), var(--card2));
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .detail-preview img {
      max-width: 200px;
      max-height: 200px;
      object-fit: contain;
    }

    .detail-options {
      margin: 0 16px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .option-row:last-child {
      border-bottom: none;
    }

    .option-row:active {
      background: var(--card2);
    }

    .option-label {
      font-size: 16px;
      font-weight: 600;
    }

    .option-hint {
      font-size: 13px;
      color: var(--text3);
      margin-top: 3px;
    }

    .toggle {
      width: 52px;
      height: 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      position: relative;
      transition: background 0.3s;
    }

    .toggle.on {
      background: var(--green);
    }

    .toggle::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .toggle.on::after {
      transform: translateX(20px);
    }

    .sender-options {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .sender-options.expanded {
      max-height: 300px;
    }

    .sender-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .sender-option:active {
      background: var(--card2);
    }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--text3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      font-size: 14px;
    }

    .check.on {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: rgba(255, 215, 0, 0.05);
    }

    .total-label {
      font-size: 14px;
      color: var(--text2);
    }

    .total-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    /* === BUY BUTTON === */
    .buy-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    }

    .buy-btn {
      width: 100%;
      height: 56px;
      border-radius: var(--radius2);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 8px 32px rgba(124, 106, 255, 0.4);
    }

    .buy-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* === ROULETTE === */
    .roulette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeUp 0.3s ease-out;
    }

    .roulette-overlay.hidden {
      display: none;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      animation: confetti 3s linear forwards;
    }

    .roulette-box {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: 28px;
      padding: 28px;
      border: 2px solid var(--border);
      transition: all 0.5s;
      position: relative;
    }

    .roulette-box.jackpot {
      animation: borderGlow 1s linear infinite;
      box-shadow: 0 0 60px rgba(255, 107, 53, 0.5);
    }

    .roulette-title {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    /* Multiplier Preview */
    .multiplier-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,215,0,0.15));
      border-radius: var(--radius2);
      border: 1px solid rgba(255,107,53,0.3);
      animation: slideUp 0.5s ease-out;
    }

    .multiplier-box.show {
      display: flex;
    }

    .multiplier-label {
      font-size: 14px;
      color: var(--text2);
      font-weight: 600;
    }

    .multiplier-value {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: multiplierBounce 0.6s ease-out;
    }

    .roulette-window {
      position: relative;
      height: 110px;
      overflow: hidden;
      border-radius: var(--radius2);
      background: rgba(0, 0, 0, 0.4);
    }

    .roulette-window::before,
    .roulette-window::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 70px;
      z-index: 2;
      pointer-events: none;
    }

    .roulette-window::before {
      left: 0;
      background: linear-gradient(to right, var(--card), transparent);
    }

    .roulette-window::after {
      right: 0;
      background: linear-gradient(to left, var(--card), transparent);
    }

    .roulette-pointer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 95px;
      height: calc(100% - 14px);
      border: 3px solid var(--accent);
      border-radius: var(--radius2);
      background: rgba(124, 106, 255, 0.1);
      z-index: 3;
      box-shadow: 0 0 20px rgba(124, 106, 255, 0.3);
      transition: all 0.3s;
    }

    .roulette-pointer.jackpot {
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.2);
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
    }

    .roulette-strip {
      display: flex;
      height: 100%;
      align-items: center;
      transition: transform 5s cubic-bezier(0.12, 0.8, 0.3, 1);
    }

    .roulette-item {
      width: 95px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .roulette-item img {
      width: 75px;
      height: 75px;
      object-fit: contain;
    }

    .roulette-item svg {
      width: 65px;
      height: 65px;
    }

    .roulette-result {
      text-align: center;
      margin-top: 28px;
      font-size: 22px;
      font-weight: 700;
      min-height: 32px;
    }

    .roulette-result.win {
      color: var(--green);
    }

    .roulette-result.lose {
      color: var(--text3);
    }

    .roulette-result.jackpot {
      font-size: 26px;
      color: var(--gold);
      animation: jackpotPulse 0.5s infinite ease-in-out;
    }

    /* Won Gifts Display */
    .won-gifts {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,215,0,0.1));
      border-radius: var(--radius2);
      border: 1px solid rgba(255,107,53,0.2);
      animation: slideUp 0.5s ease-out;
    }

    .won-gifts.show {
      display: flex;
    }

    .won-gifts-title {
      font-size: 13px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .won-gifts-grid {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .won-gift {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius3);
      min-width: 90px;
      animation: scaleIn 0.5s ease-out backwards;
    }

    .won-gift:nth-child(1) { animation-delay: 0.1s; }
    .won-gift:nth-child(2) { animation-delay: 0.25s; }
    .won-gift:nth-child(3) { animation-delay: 0.4s; }

    .won-gift img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .won-gift-name {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .won-gift-count {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      padding: 3px 10px;
      background: rgba(255, 215, 0, 0.15);
      border-radius: 999px;
    }

    .roulette-close {
      width: 100%;
      height: 54px;
      margin-top: 24px;
      border-radius: var(--radius2);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
    }

    .roulette-close:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .roulette-close.jackpot {
      background: linear-gradient(135deg, var(--orange), var(--gold));
      color: #000;
    }

    .hidden {
      display: none !important;
    }

    /* === ICONS === */
    .star-icon {
      fill: var(--gold);
    }
  </style>
</head>

<body>
  <div class="app">
    
    <!-- CATALOG SCREEN -->
    <div id="screenCatalog">
      <div class="header">
        <div class="logo">#подарочница</div>
      </div>

      <div class="tabs">
        <button class="tab active" id="tabGifts">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="10" width="18" height="12" rx="2"/><rect x="10.5" y="10" width="3" height="12" fill="#FFE066"/><path d="M12 10s-3-3-3-5c0-2 1.5-3 3-1 1.5-2 3-1 3 1 0 2-3 5-3 5z"/><rect x="4" y="6" width="16" height="4" rx="1" opacity="0.8"/></svg>
          <span>Подарки</span>
        </button>
        <button class="tab" id="tabLuck">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="7" cy="7" r="2" fill="var(--bg)"/><circle cx="12" cy="12" r="2" fill="var(--bg)"/><circle cx="17" cy="17" r="2" fill="var(--bg)"/><circle cx="17" cy="7" r="2" fill="var(--bg)"/><circle cx="7" cy="17" r="2" fill="var(--bg)"/></svg>
          <span>Удача</span>
        </button>
      </div>

      <div class="section" id="sectionGifts">
        <div class="section-title">Выбери подарок</div>
        <div class="gift-grid" id="giftGrid"></div>
      </div>

      <div class="section hidden" id="sectionLuck">
        <div class="section-title">Испытай удачу</div>
        <div class="case-grid" id="caseGrid"></div>
      </div>
    </div>

    <!-- DETAIL SCREEN -->
    <div id="screenDetails" class="hidden">
      <div class="header with-back">
        <button class="back-btn" id="btnBack">←</button>
        <div class="header-title" id="detailsTitle">Подарок</div>
      </div>

      <div class="detail-preview">
        <img id="detailsGif" alt="gift" />
      </div>

      <div class="detail-options">
        <div class="option-row" id="toggleSignature">
          <div>
            <div class="option-label">Добавить подпись</div>
            <div class="option-hint">от +2 ⭐ к стоимости</div>
          </div>
          <div class="toggle" id="signatureToggle"></div>
        </div>

        <div class="sender-options" id="senderOptions">
          <div class="sender-option" id="optFree">
            <div>
              <div class="option-label">@echoaxxs</div>
              <div class="option-hint">+2 ⭐</div>
            </div>
            <div class="check on" id="checkFree">✓</div>
          </div>
          <div class="sender-option" id="optPaid">
            <div>
              <div class="option-label">@bogclm</div>
              <div class="option-hint">+2 ⭐</div>
            </div>
            <div class="check" id="checkPaid"></div>
          </div>
          <div class="sender-option" id="optBoth">
            <div>
              <div class="option-label">@bogclm и @echoaxxs</div>
              <div class="option-hint">+5 ⭐</div>
            </div>
            <div class="check" id="checkBoth"></div>
          </div>
        </div>

        <div class="total-row">
          <div class="total-label">Итого</div>
          <div class="total-value" id="detailsTotal">
            <svg class="star-icon" width="18" height="18" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD700"/></svg>
            <span id="totalAmount">0</span>
          </div>
        </div>
      </div>

      <div class="buy-bar">
        <button class="buy-btn" id="btnBuy">
          Купить за
          <svg class="star-icon" width="18" height="18" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD700"/></svg>
          <span id="buyAmount">0</span>
        </button>
      </div>
    </div>

  </div>

  <!-- ROULETTE -->
  <div id="rouletteOverlay" class="roulette-overlay hidden">
    <div class="roulette-box" id="rouletteBox">
      <div class="roulette-title" id="rouletteTitle">Открываем кейс...</div>
      
      <div class="multiplier-box" id="multiplierBox">
        <div class="multiplier-label">🔥 Мультипликатор</div>
        <div class="multiplier-value" id="multiplierValue">x2</div>
      </div>
      
      <div class="roulette-window">
        <div class="roulette-pointer" id="roulettePointer"></div>
        <div class="roulette-strip" id="rouletteStrip"></div>
      </div>
      
      <div class="roulette-result" id="rouletteResult"></div>
      
      <div class="won-gifts" id="wonGifts">
        <div class="won-gifts-title">Ты выиграл</div>
        <div class="won-gifts-grid" id="wonGiftsGrid"></div>
      </div>
      
      <button class="roulette-close hidden" id="rouletteClose">Забрать</button>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  const API_BASE = "https://podarochnica-api.onrender.com";

  const FREE_SENDER = "@echoaxxs";
  const PAID_SENDER = "@bogclm";
  const BOTH_SENDER = "@bogclm и @echoaxxs";
  
  const SIGNATURE_COSTS = {
    "@echoaxxs": 2,
    "@bogclm": 2,
    "@bogclm и @echoaxxs": 5,
  };

  const ICONS = {
    star: `<svg class="star-icon" width="14" height="14" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD700"/></svg>`,
    nothing: `<svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="#555" stroke-width="3" fill="none"/><line x1="12" y1="12" x2="36" y2="36" stroke="#555" stroke-width="3"/></svg>`,
    box: `<svg viewBox="0 0 48 48"><path d="M4 16L24 6L44 16V36L24 46L4 36V16Z" fill="#4ECDC4"/><path d="M24 6L44 16L24 26L4 16L24 6Z" fill="#7DE8E1"/><path d="M24 26V46L4 36V16L24 26Z" fill="#3DB9B1"/><path d="M24 26V46L44 36V16L24 26Z" fill="#44C4BC"/></svg>`,
    diamond: `<svg viewBox="0 0 48 48"><path d="M24 4L42 18L24 44L6 18L24 4Z" fill="#A78BFA"/><path d="M24 4L6 18H42L24 4Z" fill="#C4B5FD"/><path d="M6 18L24 44V18H6Z" fill="#8B5CF6"/><path d="M42 18L24 44V18H42Z" fill="#9F7AEA"/></svg>`,
    money: `<svg viewBox="0 0 48 48"><ellipse cx="24" cy="26" rx="18" ry="14" fill="#34D399"/><ellipse cx="24" cy="22" rx="18" ry="14" fill="#6EE7B7"/><ellipse cx="24" cy="22" rx="14" ry="10" fill="#34D399"/><text x="24" y="27" text-anchor="middle" fill="white" font-size="16" font-weight="bold">$</text></svg>`,
    fire: `<svg viewBox="0 0 48 48"><path d="M24 4C24 4 12 16 12 28C12 36 17 44 24 44C31 44 36 36 36 28C36 16 24 4 24 4Z" fill="#FF6B35"/><path d="M24 16C24 16 18 22 18 30C18 36 21 40 24 40C27 40 30 36 30 30C30 22 24 16 24 16Z" fill="#FFD93D"/><path d="M24 26C24 26 21 30 21 34C21 37 22.5 39 24 39C25.5 39 27 37 27 34C27 30 24 26 24 26Z" fill="#FFF"/></svg>`,
    ticket: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 9V6a2 2 0 012-2h16a2 2 0 012 2v3M2 15v3a2 2 0 002 2h16a2 2 0 002-2v-3M22 9a3 3 0 00-3 3 3 3 0 003 3M2 9a3 3 0 013 3 3 3 0 01-3 3"/></svg>`
  };

  const CASE_ICONS = {
    free: ICONS.box,
    premium: ICONS.diamond,
    rich: ICONS.money,
    ultra: ICONS.fire
  };

  const GIFTS = [
    { id: "brilliant_ring", title: "Колечко", price: 100, gif_url: "/brilliant_ring.gif"},
    { id: "heroic_cup", title: "Кубок", price: 100, gif_url: "/heroic_cup.gif"},
    { id: "diamond", title: "Алмаз", price: 100, gif_url: "/diamond.gif"},
    { id: "flowers_bouquet", title: "Букет", price: 50, gif_url: "/bouquet_flowers.gif"},
    { id: "cupcake", title: "Тортик", price: 50, gif_url: "/cupcake.gif"},
    { id: "wine", title: "Вино", price: 50, gif_url: "/wine.gif"},
    { id: "rocket", title: "Ракета", price: 50, gif_url: "/rocket.gif"},
    { id: "rose", title: "Роза", price: 25, gif_url: "/rose.gif" },
    { id: "box", title: "Подарок", price: 25, gif_url: "/gift.gif" },
    { id: "heart", title: "Сердце", price: 15, gif_url: "/heart.gif" },
    { id: "bear", title: "Мишка", price: 15, gif_url: "/bear.gif"},
  ];

  const CASES = [
    { id: "weekly", name: "Еженедельный", price: 0, priceText: "Бесплатно", type: "free", drops: ["rose", "box", "heart", "bear"], nothingChance: 1.0, nothingOnStrip: 0.55 },
    { id: "premium", name: "Премиум", price: 30, priceText: "30", type: "premium", drops: ["rose", "box", "rocket"], nothingChance: 0.3, nothingOnStrip: 0.2 },
    { id: "rich", name: "Богач", price: 100, priceText: "100", type: "rich", drops: ["rose", "box", "brilliant_ring", "rocket"], nothingChance: 0.15, nothingOnStrip: 0.1 },
    { id: "ultra", name: "Ультра", price: 500, priceText: "500", type: "ultra", drops: ["brilliant_ring", "diamond", "heroic_cup"], nothingChance: 0.05, nothingOnStrip: 0.03,
      multiplier: { enabled: true, chances: [{ count: 1, chance: 0.70 }, { count: 2, chance: 0.22 }, { count: 3, chance: 0.08 }] }
    },
  ];

  let selectedGift = null;
  let sender = FREE_SENDER;
  let addSignature = false;
  let weeklyUsed = localStorage.getItem('weeklyUsed') || null;
  let userCredits = { cases: {}, gifts: {} };

  // === API ===
  async function safeFetch(url, options = {}) {
    const maxRetries = 2;
    let lastError;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response;
      } catch (error) {
        lastError = error;
        if (attempt < maxRetries) await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
      }
    }
    throw lastError;
  }

  async function loadCredits() {
    if (!tg?.initData || !API_BASE) return;
    try {
      const resp = await safeFetch(`${API_BASE}/api/get-credits`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData })
      });
      userCredits = await resp.json() || { cases: {}, gifts: {} };
      if (!document.getElementById("sectionLuck").classList.contains("hidden")) renderCases();
    } catch (e) {
      userCredits = { cases: {}, gifts: {} };
    }
  }

  async function useCreditAPI(itemType, itemId) {
    if (!tg?.initData || !API_BASE) {
      if (userCredits[itemType === "case" ? "cases" : "gifts"]?.[itemId] > 0) {
        userCredits[itemType === "case" ? "cases" : "gifts"][itemId]--;
        return true;
      }
      return false;
    }
    try {
      const resp = await safeFetch(`${API_BASE}/api/use-credit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData, itemType, itemId })
      });
      const result = await resp.json();
      if (result.success) {
        const cat = itemType === "case" ? "cases" : "gifts";
        if (userCredits[cat]?.[itemId]) userCredits[cat][itemId]--;
        return true;
      }
      return false;
    } catch (e) {
      return false;
    }
  }

  function getCaseCredits(id) { return userCredits.cases?.[id] || 0; }

  function isWeeklyAvailable() {
    if (!weeklyUsed) return true;
    return (new Date() - new Date(weeklyUsed)) >= 7 * 24 * 60 * 60 * 1000;
  }

  function getWeeklyCooldown() {
    if (!weeklyUsed || isWeeklyAvailable()) return null;
    const diff = new Date(new Date(weeklyUsed).getTime() + 7 * 24 * 60 * 60 * 1000) - new Date();
    const days = Math.floor(diff / (24 * 60 * 60 * 1000));
    const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
    return days > 0 ? `${days}д ${hours}ч` : `${hours}ч`;
  }

  // === MULTIPLIER ===
  function rollMultiplier(caseData) {
    const m = caseData.multiplier;
    if (!m || !m.enabled) return 1;
    const roll = Math.random();
    let cum = 0;
    for (const opt of m.chances) {
      cum += opt.chance;
      if (roll < cum) return opt.count;
    }
    return 1;
  }

  function rollCaseGifts(caseData, count) {
    const caseGifts = caseData.drops.map(id => GIFTS.find(g => g.id === id)).filter(Boolean);
    const nothingChance = caseData.nothingChance || 0.5;
    const results = [];
    for (let i = 0; i < count; i++) {
      const adj = count > 1 ? nothingChance * 0.3 : nothingChance;
      if (Math.random() < adj && count === 1) {
        results.push(null);
      } else {
        results.push(caseGifts[Math.floor(Math.random() * caseGifts.length)]);
      }
    }
    const real = results.filter(g => g !== null);
    return real.length > 0 ? real : [null];
  }

  function spawnConfetti() {
    const overlay = document.getElementById("rouletteOverlay");
    const colors = ['#FF6B35', '#FFD93D', '#FF4757', '#00D26A', '#00D4FF', '#A855F7'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + '%';
      el.style.top = '-10px';
      el.style.width = (6 + Math.random() * 10) + 'px';
      el.style.height = (6 + Math.random() * 10) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      overlay.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
  }

  // === RENDER ===
  function renderGifts() {
    const grid = document.getElementById("giftGrid");
    grid.innerHTML = "";
    GIFTS.forEach((g, i) => {
      const el = document.createElement("div");
      el.className = "gift-card";
      el.style.animationDelay = `${i * 0.05}s`;
      el.innerHTML = `
        <div class="gift-img"><img src="${g.gif_url}" alt="${g.title}" loading="lazy"></div>
        <div class="gift-price">${ICONS.star}${g.price}</div>
      `;
      el.onclick = () => openDetails(g);
      grid.appendChild(el);
    });
  }

  function renderCases() {
    const grid = document.getElementById("caseGrid");
    grid.innerHTML = "";
    CASES.forEach((c, i) => {
      const isWeekly = c.id === "weekly";
      const available = !isWeekly || isWeeklyAvailable();
      const cooldown = isWeekly ? getWeeklyCooldown() : null;
      const credits = getCaseCredits(c.id);
      const hasCredit = credits > 0;
      const hasMultiplier = c.multiplier?.enabled;

      const el = document.createElement("div");
      el.className = `case-card ${c.type}${!available && !hasCredit ? ' disabled' : ''}`;
      el.style.animationDelay = `${i * 0.1}s`;

      const priceContent = c.price === 0 ? c.priceText : `${ICONS.star}${c.priceText}`;
      let badges = '';
      if (hasMultiplier) badges += `<div class="case-badge jackpot">🔥 до x3</div>`;
      if (hasCredit) badges += `<div class="case-badge credit">${ICONS.ticket} ${credits}</div>`;
      if (cooldown && !hasCredit) badges += `<div class="case-cooldown">Через ${cooldown}</div>`;

      el.innerHTML = `
        <div class="case-icon">${CASE_ICONS[c.type]}</div>
        <div class="case-name">${c.name}</div>
        <div class="case-price">${priceContent}</div>
        ${badges}
      `;

      if (available || hasCredit) el.onclick = () => openCase(c, hasCredit);
      grid.appendChild(el);
    });
  }

  // === DETAILS ===
  function openDetails(g) {
    selectedGift = g;
    sender = FREE_SENDER;
    addSignature = false;
    document.getElementById("screenCatalog").classList.add("hidden");
    document.getElementById("screenDetails").classList.remove("hidden");
    document.getElementById("detailsTitle").textContent = g.title;
    document.getElementById("detailsGif").src = g.gif_url;
    document.getElementById("signatureToggle").classList.remove("on");
    document.getElementById("senderOptions").classList.remove("expanded");
    syncSenderUI();
    updateTotalUI();
  }

  function closeDetails() {
    document.getElementById("screenDetails").classList.add("hidden");
    document.getElementById("screenCatalog").classList.remove("hidden");
  }

  function syncSenderUI() {
    document.getElementById("checkFree").classList.toggle("on", sender === FREE_SENDER);
    document.getElementById("checkFree").textContent = sender === FREE_SENDER ? "✓" : "";
    document.getElementById("checkPaid").classList.toggle("on", sender === PAID_SENDER);
    document.getElementById("checkPaid").textContent = sender === PAID_SENDER ? "✓" : "";
    document.getElementById("checkBoth").classList.toggle("on", sender === BOTH_SENDER);
    document.getElementById("checkBoth").textContent = sender === BOTH_SENDER ? "✓" : "";
  }

  function totalPrice() {
    if (!selectedGift) return 0;
    return addSignature ? selectedGift.price + (SIGNATURE_COSTS[sender] || 2) : selectedGift.price;
  }

  function updateTotalUI() {
    const t = totalPrice();
    document.getElementById("totalAmount").textContent = t;
    document.getElementById("buyAmount").textContent = t;
  }

  // === CASE ===
  async function openCase(caseData, useCredit = false) {
    const isWeekly = caseData.id === "weekly";
    const isPaid = caseData.price > 0 && !useCredit;

    if (isPaid) {
      if (!tg?.initData || !API_BASE) {
        alert(`Тест: ${caseData.name} за ${caseData.price}⭐`);
        showRoulette(caseData, false);
        return;
      }
      try {
        const resp = await safeFetch(`${API_BASE}/api/create-invoice`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData: tg.initData, caseId: caseData.id })
        });
        const data = await resp.json();
        if (data.link) {
          tg.openInvoice(data.link, (status) => {
            if (status === "paid") showRoulette(caseData, false);
          });
        } else {
          alert("Не удалось создать счёт");
        }
        return;
      } catch (e) {
        alert("Ошибка: " + e.message);
        return;
      }
    }

    if (useCredit) {
      const ok = await useCreditAPI("case", caseData.id);
      if (!ok) { alert("Не удалось использовать кредит"); return; }
    }

    showRoulette(caseData, isWeekly);
  }

  function showRoulette(caseData, isWeekly) {
    const overlay = document.getElementById("rouletteOverlay");
    const box = document.getElementById("rouletteBox");
    const strip = document.getElementById("rouletteStrip");
    const title = document.getElementById("rouletteTitle");
    const result = document.getElementById("rouletteResult");
    const closeBtn = document.getElementById("rouletteClose");
    const pointer = document.getElementById("roulettePointer");
    const multiplierBox = document.getElementById("multiplierBox");
    const multiplierValue = document.getElementById("multiplierValue");
    const wonGifts = document.getElementById("wonGifts");
    const wonGiftsGrid = document.getElementById("wonGiftsGrid");

    // Reset
    overlay.classList.remove("hidden");
    box.classList.remove("jackpot");
    pointer.classList.remove("jackpot");
    closeBtn.classList.remove("jackpot");
    multiplierBox.classList.remove("show");
    wonGifts.classList.remove("show");
    title.textContent = `${caseData.name} кейс`;
    result.textContent = "";
    result.className = "roulette-result";
    closeBtn.classList.add("hidden");

    // Multiplier
    const giftCount = rollMultiplier(caseData);
    const isJackpot = giftCount > 1;

    if (isJackpot) {
      multiplierValue.textContent = `x${giftCount}`;
      multiplierBox.classList.add("show");
      setTimeout(() => {
        box.classList.add("jackpot");
        pointer.classList.add("jackpot");
      }, 600);
    }

    // Roll gifts
    const wonGiftsList = rollCaseGifts(caseData, giftCount);
    const hasRealWin = wonGiftsList.some(g => g !== null);

    // Build strip
    const nothingItem = { id: "nothing", title: "Ничего", isNothing: true };
    const items = [];
    const nothingOnStrip = caseData.nothingOnStrip || 0.25;
    const caseGifts = caseData.drops.map(id => GIFTS.find(g => g.id === id)).filter(Boolean);

    for (let i = 0; i < 50; i++) {
      if (Math.random() < nothingOnStrip) items.push(nothingItem);
      else items.push(caseGifts[Math.floor(Math.random() * caseGifts.length)]);
    }

    const winIndex = isWeekly ? 38 : 35;
    const displayItem = hasRealWin ? wonGiftsList.find(g => g !== null) : nothingItem;
    items[winIndex] = displayItem.isNothing ? nothingItem : displayItem;

    if (!isWeekly && hasRealWin) {
      for (let off of [-2, -1, 1, 2]) {
        if (Math.random() > 0.5) items[winIndex + off] = caseGifts[Math.floor(Math.random() * caseGifts.length)];
      }
    }

    strip.innerHTML = items.map(item => {
      if (item.isNothing) return `<div class="roulette-item">${ICONS.nothing}</div>`;
      return `<div class="roulette-item"><img src="${item.gif_url}" alt="${item.title}"></div>`;
    }).join("");

    strip.style.transition = "none";
    strip.style.transform = "translateX(0)";

    const containerWidth = document.querySelector('.roulette-window').offsetWidth;
    const itemWidth = 95;
    const centerOffset = (containerWidth / 2) - (itemWidth / 2);

    const startDelay = isJackpot ? 900 : 100;

    setTimeout(() => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          strip.style.transition = "transform 5s cubic-bezier(0.12, 0.8, 0.3, 1)";
          strip.style.transform = `translateX(-${(winIndex * itemWidth) - centerOffset}px)`;
        });
      });
    }, startDelay);

    const resultDelay = 5500 + startDelay;

    setTimeout(() => {
      if (!hasRealWin) {
        result.textContent = "Ничего не выпало...";
        result.classList.add("lose");
        multiplierBox.classList.remove("show");
      } else if (isJackpot) {
        spawnConfetti();
        result.innerHTML = `🔥 ДЖЕКПОТ x${giftCount}! 🔥`;
        result.classList.add("jackpot");
        closeBtn.classList.add("jackpot");

        wonGiftsGrid.innerHTML = "";
        const counts = {};
        wonGiftsList.filter(g => g).forEach(g => counts[g.id] = (counts[g.id] || 0) + 1);

        Object.entries(counts).forEach(([giftId, count]) => {
          const gift = GIFTS.find(g => g.id === giftId);
          if (gift) {
            const el = document.createElement("div");
            el.className = "won-gift";
            el.innerHTML = `
              <img src="${gift.gif_url}" alt="${gift.title}">
              <div class="won-gift-name">${gift.title}</div>
              ${count > 1 ? `<div class="won-gift-count">x${count}</div>` : ''}
            `;
            wonGiftsGrid.appendChild(el);
          }
        });

        wonGifts.classList.add("show");
      } else {
        const winItem = wonGiftsList[0];
        result.textContent = `Выпало: ${winItem.title}!`;
        result.classList.add("win");
      }

      if (isWeekly) {
        weeklyUsed = new Date().toISOString();
        localStorage.setItem('weeklyUsed', weeklyUsed);
      }

      closeBtn.classList.remove("hidden");
      closeBtn.textContent = !hasRealWin ? "Закрыть" : (isJackpot ? "🔥 Забрать всё!" : "Забрать");
    }, resultDelay);
  }

  // === EVENTS ===
  document.getElementById("tabGifts").onclick = () => {
    document.getElementById("tabGifts").classList.add("active");
    document.getElementById("tabLuck").classList.remove("active");
    document.getElementById("sectionGifts").classList.remove("hidden");
    document.getElementById("sectionLuck").classList.add("hidden");
  };

  document.getElementById("tabLuck").onclick = () => {
    document.getElementById("tabLuck").classList.add("active");
    document.getElementById("tabGifts").classList.remove("active");
    document.getElementById("sectionLuck").classList.remove("hidden");
    document.getElementById("sectionGifts").classList.add("hidden");
    renderCases();
  };

  document.getElementById("toggleSignature").onclick = () => {
    addSignature = !addSignature;
    document.getElementById("signatureToggle").classList.toggle("on", addSignature);
    document.getElementById("senderOptions").classList.toggle("expanded", addSignature);
    updateTotalUI();
  };

  document.getElementById("optFree").onclick = () => { sender = FREE_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("optPaid").onclick = () => { sender = PAID_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("optBoth").onclick = () => { sender = BOTH_SENDER; syncSenderUI(); updateTotalUI(); };
  document.getElementById("btnBack").onclick = closeDetails;

  document.getElementById("btnBuy").onclick = async () => {
    const t = totalPrice();
    if (!tg?.initData || !API_BASE) {
      alert(`Тест: ${selectedGift.title}${addSignature ? `\nОт: ${sender}` : ''}\nИтого: ${t}⭐`);
      return;
    }
    try {
      const resp = await safeFetch(`${API_BASE}/api/create-invoice`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData: tg.initData, giftId: selectedGift.id, sender: addSignature ? sender : null })
      });
      const data = await resp.json();
      if (data.link) {
        tg.openInvoice(data.link, (status) => { if (status === "paid") tg.close(); });
      } else {
        alert("Не удалось создать счёт");
      }
    } catch (e) {
      alert("Ошибка: " + e.message);
    }
  };

  document.getElementById("rouletteClose").onclick = () => {
    document.getElementById("rouletteOverlay").classList.add("hidden");
    document.getElementById("rouletteBox").classList.remove("jackpot");
    document.getElementById("multiplierBox").classList.remove("show");
    document.getElementById("wonGifts").classList.remove("show");
    document.querySelectorAll('.confetti').forEach(el => el.remove());
    renderCases();
  };

  // === INIT ===
  function init() {
    renderGifts();
    loadCredits();
  }

  if (tg) {
    tg.ready();
    tg.expand();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
