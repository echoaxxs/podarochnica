<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Подарочница</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --bg2: #0a0a0c;
      --card: #1c1c1e;
      --card2: #2c2c2e;
      --card3: #3a3a3c;
      --text: #ffffff;
      --text2: rgba(255,255,255,0.7);
      --text3: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --accent: #0A84FF;
      --gold: #FFD60A;
      --gold2: #FF9F0A;
      --green: #32D74B;
      --red: #FF453A;
      --purple: #BF5AF2;
      --cyan: #64D2FF;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    /* === ГЛОБАЛЬНЫЙ СБРОС И АДАПТИВНОСТЬ === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden; /* Скрываем только гориз. скролл */
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
      /* Отступ снизу для таббара + безопасная зона iPhone */
      padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
    }

    .hidden { display: none !important; }
    
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(255,214,10,0.3); } 50% { box-shadow: 0 0 25px rgba(255,214,10,0.5); } }

    /* === БАЛАНС (Адаптивный угол) === */
    .balance-widget {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: linear-gradient(135deg, rgba(255,214,10,0.2), rgba(255,159,10,0.15));
      border: 1px solid rgba(255,214,10,0.3);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    .balance-widget svg { width: 16px; height: 16px; color: var(--gold); }
    .balance-widget span { font-size: 14px; font-weight: 700; color: var(--gold); }

    /* === PITY БАР === */
    .pity-bar {
      margin: calc(60px + env(safe-area-inset-top)) 16px 12px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .pity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pity-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
    .pity-value { font-size: 12px; font-weight: 700; color: var(--green); }
    .pity-track { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
    .pity-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); border-radius: 3px; transition: width 0.5s ease; }

    /* === СЕКЦИИ === */
    .section {
      width: 100%;
      padding: 16px;
      animation: fadeIn 0.3s ease-out;
    }
    .section.with-pity { padding-top: 8px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-top: calc(44px + env(safe-area-inset-top)); }
    .section.with-pity .section-header { padding-top: 0; }
    .section-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

    /* === ГЛАВНАЯ (НОВОСТИ) === */
    .news-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
    .news-card {
      width: 100%;
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .news-img {
      width: 100%;
      aspect-ratio: 16/9; /* Адаптивная высота картинок */
      max-height: 200px;
      background: linear-gradient(135deg, var(--card2), var(--card3));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .news-img img { width: 100%; height: 100%; object-fit: cover; }
    .news-content { padding: 16px; }
    .news-date { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; }
    .news-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; word-break: break-word; }
    .news-text { font-size: 14px; color: var(--text2); line-height: 1.4; word-break: break-word; }

    /* === ПРОМОКОД === */
    .promo-card { background: var(--card); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); width: 100%; }
    .promo-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .promo-title svg { width: 20px; height: 20px; color: var(--cyan); }
    .promo-input-row { display: flex; gap: 10px; width: 100%; }
    .promo-input {
      flex: 1;
      width: 100%; /* Fix для Safari */
      height: 50px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0 16px;
      font-size: 16px;
      color: var(--text);
      text-transform: uppercase;
    }
    .promo-input::placeholder { text-transform: none; color: var(--text3); }
    .promo-btn {
      width: 50px; height: 50px; flex-shrink: 0;
      background: var(--accent); border: none; border-radius: var(--radius-md);
      color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .promo-result { margin-top: 14px; padding: 14px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .promo-result svg { width: 20px; height: 20px; flex-shrink: 0; }
    .promo-result.success { background: rgba(50,215,75,0.15); color: var(--green); }
    .promo-result.error { background: rgba(255,69,58,0.15); color: var(--red); }

    /* === АДМИН ПАНЕЛЬ (Адаптивная) === */
    .admin-section { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); width: 100%; }
    .admin-form { background: var(--card); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--border); }
    .admin-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; width: 100%; }
    .admin-input, .admin-select {
      flex: 1; min-width: 100px; height: 46px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 12px;
      color: var(--text); font-size: 14px;
    }
    .admin-btn { height: 46px; padding: 0 20px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; font-weight: 600; }
    .admin-promo-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; word-break: break-all; }
    .admin-promo-del { width: 36px; height: 36px; flex-shrink: 0; background: rgba(255,69,58,0.2); border: none; border-radius: 10px; color: var(--red); display: flex; align-items: center; justify-content: center; }

    /* === КЕЙСЫ (АДАПТИВНАЯ СЕТКА) === */
    .case-categories {
      display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px;
      -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
    }
    .case-categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 10px 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* СЕТКА КЕЙСОВ: Автоматически 2 колонки на телефоне, 3-4 на планшете */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
    }
    .case-card {
      background: var(--card); border-radius: var(--radius-lg); padding: 18px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      border: 1px solid var(--border); position: relative; width: 100%;
    }
    .case-card.cheap { border-top: 3px solid var(--green); }
    .case-card.gifts { border-top: 3px solid var(--purple); }
    .case-card.stars { border-top: 3px solid var(--gold); background: linear-gradient(180deg, rgba(255,214,10,0.12) 0%, var(--card) 100%); }
    .case-icon { width: 50px; height: 50px; }
    .case-icon svg { width: 100%; height: 100%; }
    .case-name { font-size: 14px; font-weight: 700; text-align: center; }
    .case-price-row { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 700; color: var(--gold); }
    .case-price-row svg { width: 16px; height: 16px; }
    .case-badge { position: absolute; top: 8px; right: 8px; padding: 4px 6px; border-radius: 6px; font-size: 9px; font-weight: 700; }
    .case-badge.jackpot { background: var(--gold2); color: #000; }
    .case-badge.pity { background: var(--green); color: #000; }

    /* === ПОДАРКИ (АДАПТИВНАЯ СЕТКА) === */
    .gift-grid {
      display: grid;
      /* На маленьком экране будет 3 колонки (мин 100px), на большом больше */
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      width: 100%;
    }
    .gift-card {
      background: var(--card); border-radius: var(--radius-md); padding: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      border: 1px solid var(--border); width: 100%;
    }
    .gift-img { width: 100%; aspect-ratio: 1; border-radius: var(--radius-sm); background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; padding: 8px; }
    .gift-img img { width: 100%; height: 100%; object-fit: contain; }
    .gift-price { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: var(--gold); }

    /* === МОДАЛЬНЫЕ ОКНА (АДАПТИВНЫЕ) === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.2s;
    }
    .modal-box {
      background: var(--card); border-radius: var(--radius-lg);
      padding: 24px; width: 100%; max-width: 360px;
      max-height: 90vh; overflow-y: auto; /* Скролл внутри модалки если экран мал */
      border: 1px solid var(--border);
    }
    
    .choice-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      height: 54px; border-radius: var(--radius-md); border: none;
      font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 10px;
    }
    .choice-btn.stars { background: var(--accent); }
    .choice-btn.balance { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #000; }
    .choice-btn.cancel { background: var(--card2); }

    .gift-detail-preview { width: 100%; aspect-ratio: 1; background: var(--bg2); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; border: 1px solid var(--border); }
    .gift-detail-preview img { width: 60%; height: 60%; object-fit: contain; }
    
    .signature-toggle { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card2); border-radius: var(--radius-md); margin-bottom: 12px; }
    .toggle-switch { width: 50px; height: 30px; background: #39393D; border-radius: 30px; position: relative; flex-shrink: 0; transition: 0.3s; }
    .toggle-switch.on { background: var(--green); }
    .toggle-switch::after { content: ""; position: absolute; width: 26px; height: 26px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
    .toggle-switch.on::after { transform: translateX(20px); }
    
    .sender-options { display: none; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .sender-options.show { display: flex; }
    .sender-option { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--card2); border-radius: var(--radius-sm); border: 2px solid transparent; }
    .sender-option.selected { border-color: var(--accent); background: rgba(10,132,255,0.1); }
    
    .gift-total { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,214,10,0.1); border-radius: var(--radius-md); margin-bottom: 16px; }
    .gift-buy-btns { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
    .gift-buy-btn { flex: 1; min-width: 140px; height: 54px; border-radius: var(--radius-md); border: none; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .gift-buy-btn.primary { background: var(--accent); color: #fff; }
    .gift-buy-btn.balance { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #000; }

    /* === РУЛЕТКА === */
    .roulette-box { width: 100%; max-width: 400px; margin: 0 auto; }
    .roulette-window { position: relative; height: 150px; width: 100%; overflow: hidden; border-radius: 14px; background: var(--bg2); border: 2px solid var(--border); box-shadow: inset 0 0 40px rgba(0,0,0,0.7); }
    .roulette-strip { display: flex; height: 100%; align-items: center; gap: 8px; padding: 0 4px; }
    .r-item { width: 100px; height: 130px; background: var(--card); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px; flex-shrink: 0; border: 2px solid var(--border); }
    .r-item.star { background: linear-gradient(135deg, var(--gold), var(--gold2)); border: none; color: #000; }
    .r-img { width: 48px; height: 48px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
    .r-img img { width: 100%; height: 100%; object-fit: contain; }
    .r-label { font-size: 11px; font-weight: 700; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r-value { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px; color: var(--gold); }
    .r-item.star .r-value { color: #000; }
    .roulette-pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #fff; transform: translateX(-50%); z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.9); }
    
    /* === НИЖНИЕ ТАБЫ === */
    .bottom-tabs {
      position: fixed; bottom: 0; left: 0; right: 0; display: flex;
      background: rgba(18,18,20,0.95); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 50;
      width: 100%;
    }
    .bottom-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--text3); font-size: 10px; font-weight: 600; }
    .bottom-tab.active { color: var(--accent); }
    
    /* === SUBSCRIBE === */
    .subscribe-box { width: 100%; max-width: 360px; }
    .subscribe-channel { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card2); border-radius: var(--radius-md); text-decoration: none; color: var(--text); border: 2px solid transparent; width: 100%; }
    .subscribe-channel.subscribed { border-color: var(--green); background: rgba(50,215,75,0.1); }
  </style>
</head>

<body>
<div class="app">
  <!-- БАЛАНС -->
  <div class="balance-widget" id="balanceWidget">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    <span id="balanceValue">0</span>
  </div>

  <!-- PITY -->
  <div class="pity-bar hidden" id="pityBar">
    <div class="pity-header">
      <span class="pity-label">До гарантированного подарка</span>
      <span class="pity-value" id="pityValue">20⭐</span>
    </div>
    <div class="pity-track"><div class="pity-fill" id="pityFill" style="width: 0%"></div></div>
  </div>

  <!-- СЕКЦИИ -->
  <div class="section" id="sectionHome"></div>
  <div class="section with-pity hidden" id="sectionCases"></div>
  <div class="section hidden" id="sectionGifts"></div>

  <!-- ТАБЫ -->
  <nav class="bottom-tabs">
    <button class="bottom-tab active" id="tabHome"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Главная</span></button>
    <button class="bottom-tab" id="tabCases"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg><span>Кейсы</span></button>
    <button class="bottom-tab" id="tabGifts"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/></svg><span>Подарки</span></button>
  </nav>
</div>

<!-- ПОДПИСКА -->
<div class="subscribe-overlay hidden" id="subscribeOverlay">
  <div class="modal-box subscribe-box">
    <div style="font-size: 48px; margin-bottom: 12px;">🔔</div>
    <h2 style="margin-bottom:8px">Подпишись на каналы</h2>
    <p style="color:var(--text2); font-size:14px; margin-bottom:20px;">Для работы бота нужна подписка</p>
    <div id="subscribeChannels" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;"></div>
    <button class="choice-btn stars" id="subscribeCheck">Проверить подписку</button>
  </div>
</div>

<!-- КЕЙС МОДАЛКА -->
<div class="modal-overlay hidden" id="caseChoiceModal">
  <div class="modal-box">
    <div class="case-choice-icon" id="choiceIcon" style="width:64px;height:64px;margin:0 auto 16px;"></div>
    <div class="case-choice-title" id="choiceTitle" style="text-align:center;font-size:20px;font-weight:700;margin-bottom:20px;"></div>
    <button class="choice-btn stars" id="choiceStars"><svg viewBox="0 0 24 24" fill="#FFD700" width="20" height="20"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> <span id="choicePriceStars"></span> Stars</button>
    <button class="choice-btn balance" id="choiceBalance"><svg viewBox="0 0 24 24" fill="#000" width="20" height="20"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> <span id="choicePriceBalance"></span> С баланса</button>
    <button class="choice-btn cancel" id="choiceCancel">Отмена</button>
  </div>
</div>

<!-- ПОДАРОК МОДАЛКА -->
<div class="modal-overlay hidden" id="giftDetailModal">
  <div class="modal-box">
    <div class="gift-detail-preview"><img id="giftDetailImg" src="" alt="" /></div>
    <div class="gift-detail-title" id="giftDetailTitle" style="text-align:center;font-size:22px;font-weight:700;margin-bottom:16px;"></div>
    
    <div class="signature-toggle" id="signatureToggle">
      <div><div style="font-size:15px;font-weight:500;">Добавить подпись</div><div style="font-size:12px;color:var(--text3);">от +2 Stars</div></div>
      <div class="toggle-switch" id="signatureSwitch"></div>
    </div>
    
    <div class="sender-options" id="senderOptions"></div>
    
    <div class="gift-total">
      <span style="font-size:15px;color:var(--text2);">Итого</span>
      <span style="font-size:22px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:4px;"><svg viewBox="0 0 24 24" fill="#FFD700" width="20" height="20"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> <span id="giftTotalAmount">0</span></span>
    </div>
    
    <div class="gift-buy-btns">
      <button class="gift-buy-btn primary" id="giftBuyStars"><svg viewBox="0 0 24 24" fill="#FFD700" width="18" height="18"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> <span id="giftBuyStarsAmount">0</span></button>
      <button class="gift-buy-btn balance" id="giftBuyBalance">Баланс <span id="giftBuyBalanceAmount">0</span></button>
    </div>
  </div>
</div>

<!-- РУЛЕТКА -->
<div class="roulette-overlay hidden" id="rouletteOverlay">
  <div class="roulette-box">
    <div id="rouletteTitle" style="text-align:center;font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;"></div>
    <div class="roulette-window"><div class="roulette-pointer"></div><div class="roulette-strip" id="rouletteStrip"></div></div>
    <div id="rouletteResult" style="text-align:center;margin-top:20px;font-size:18px;font-weight:700;min-height:28px;"></div>
    <button class="choice-btn cancel hidden" id="rouletteClose" style="margin-top:20px;">Закрыть</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
const API = "https://podarochnica-api.onrender.com";

const state = {
  balance: 0, pitySpent: 0, pityThreshold: 20, isAdmin: false, subscribed: true,
  channels: [], gifts: [], cases: {}, news: [],
  selectedGift: null, selectedCase: null, addSignature: false, sender: "@echoaxxs", currentCategory: "cheap"
};

const SENDERS = [{ key: "@echoaxxs", label: "@echoaxxs", cost: 2 }, { key: "@bogclm", label: "@bogclm", cost: 2 }, { key: "@bogclm и @echoaxxs", label: "@bogclm и @echoaxxs", cost: 5 }];

const ICONS = {
  star: `<svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>`,
  nothing: `<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16" stroke="#666" stroke-width="3" fill="none"/><line x1="14" y1="14" x2="34" y2="34" stroke="#666" stroke-width="3"/></svg>`,
  box: `<svg viewBox="0 0 48 48"><path d="M6 18L24 8L42 18V34L24 44L6 34V18Z" fill="#4ECDC4"/><path d="M24 8L42 18L24 28L6 18L24 8Z" fill="#7DE8E1"/><path d="M24 28V44L6 34V18L24 28Z" fill="#3DB9B1"/></svg>`,
  diamond: `<svg viewBox="0 0 48 48"><path d="M24 4L42 18L24 44L6 18L24 4Z" fill="#A78BFA"/><path d="M24 4L6 18H42L24 4Z" fill="#C4B5FD"/><path d="M6 18L24 44V28L6 18Z" fill="#8B5CF6"/></svg>`,
  starCase: `<svg viewBox="0 0 48 48"><path d="M24 4L30 16L44 18L34 28L36 42L24 36L12 42L14 28L4 18L18 16L24 4Z" fill="#FFD60A"/><path d="M24 4L30 16L44 18L34 28L36 42L24 36" fill="#E5C000"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`,
  close: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>`
};

async function api(endpoint, data = {}) {
  const res = await fetch(`${API}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ initData: tg?.initData || "", ...data }) });
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || `HTTP ${res.status}`);
  return res.json();
}
async function apiGet(endpoint) {
  const res = await fetch(`${API}${endpoint}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function init() {
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#000000'); tg.setBackgroundColor('#000000'); }
  try {
    const sub = await api("/api/check-subscription");
    state.subscribed = sub.subscribed; state.channels = sub.channels || [];
    if (!state.subscribed && state.channels.length > 0) { showSubscribeOverlay(); return; }
  } catch (e) {}
  await loadApp();
}

async function loadApp() {
  try {
    const [u, n, g, c] = await Promise.all([
      api("/api/get-user-data").catch(()=>({})), apiGet("/api/get-news").catch(()=>({news:[]})),
      apiGet("/api/get-gifts").catch(()=>({gifts:[]})), apiGet("/api/get-cases").catch(()=>({categories:{}}))
    ]);
    state.balance = u.starBalance || 0; state.pitySpent = u.pitySpent || 0; state.pityThreshold = u.pityThreshold || 20; state.isAdmin = u.isAdmin || false;
    state.news = n.news || []; state.gifts = g.gifts || []; state.cases = c.categories || {};
  } catch(e) {}
  renderHome(); renderCases(); renderGifts(); setupTabs(); updateUI();
}

function updateUI() {
  document.getElementById("balanceValue").textContent = state.balance.toLocaleString();
  const bar = document.getElementById("pityBar"), rem = state.pityThreshold - state.pitySpent;
  if (state.pitySpent > 0 && rem > 0 && document.getElementById("tabCases").classList.contains("active")) {
    bar.classList.remove("hidden"); document.getElementById("pityValue").textContent = `${rem}⭐`;
    document.getElementById("pityFill").style.width = `${(state.pitySpent / state.pityThreshold) * 100}%`;
  } else bar.classList.add("hidden");
}

function showSubscribeOverlay() {
  document.getElementById("subscribeChannels").innerHTML = state.channels.map(ch => `
    <a href="${ch.username ? `https://t.me/${ch.username}` : `https://t.me/c/${ch.id.toString().replace('-100', '')}`}" target="_blank" class="subscribe-channel ${ch.missing ? '' : 'subscribed'}">
      <div style="flex:1"><div style="font-weight:600">${ch.title||ch.id}</div><div style="font-size:12px;color:var(${ch.missing?'--text3':'--green'})">${ch.missing?'Подпишись':'✓'}</div></div>
    </a>`).join("");
  document.getElementById("subscribeOverlay").classList.remove("hidden");
}

document.getElementById("subscribeCheck").onclick = async function() {
  this.textContent = "Проверяем...";
  try {
    const sub = await api("/api/check-subscription");
    if (sub.subscribed) { document.getElementById("subscribeOverlay").classList.add("hidden"); await loadApp(); }
    else { state.channels = sub.channels || []; showSubscribeOverlay(); this.textContent = "Проверить"; }
  } catch(e) { this.textContent = "Проверить"; }
};

function setupTabs() {
  const tabs = { Home: "sectionHome", Cases: "sectionCases", Gifts: "sectionGifts" };
  Object.keys(tabs).forEach(name => {
    document.getElementById(`tab${name}`).onclick = () => {
      Object.keys(tabs).forEach(n => {
        document.getElementById(`tab${n}`).classList.toggle("active", n === name);
        document.getElementById(tabs[n]).classList.toggle("hidden", n !== name);
      });
      updateUI(); // Обновит видимость pity bar
    };
  });
}

function renderHome() {
  const s = document.getElementById("sectionHome");
  let newsHtml = state.news.length ? state.news.map(n => `
    <div class="news-card"><div class="news-img">${n.image ? `<img src="${n.image}">` : '📰'}</div>
    <div class="news-content"><div class="news-date">${n.date}</div><div class="news-title">${n.title}</div><div class="news-text">${n.text}</div></div></div>
  `).join("") : `<div class="news-card"><div class="news-content" style="text-align:center;color:var(--text3)">Пока нет новостей</div></div>`;
  
  let admin = state.isAdmin ? `
    <div class="admin-section"><div style="color:var(--red);font-weight:700;margin-bottom:10px">Админка (Промо)</div>
    <div class="admin-form"><div class="admin-row"><input class="admin-input" id="admC" placeholder="Код"><select class="admin-select" id="admT"><option value="stars">Stars</option><option value="gift">Gift</option><option value="case">Case</option></select></div>
    <div class="admin-row"><input class="admin-input" id="admR" placeholder="ID/Кол-во"><button class="admin-btn" onclick="createPromo()">Создать</button></div></div>
    <div id="admList"></div></div>` : '';
    
  s.innerHTML = `<div class="section-header"><div class="section-title">🏠 Главная</div></div>
    <div class="news-list">${newsHtml}</div>
    <div class="promo-card"><div class="promo-title">🎟 Промокод</div><div class="promo-input-row"><input id="promoInput" class="promo-input" placeholder="Код..."><button id="promoBtn" class="promo-btn">➜</button></div><div id="promoResult" class="promo-result hidden"></div></div>
    ${admin}`;
    
  document.getElementById("promoBtn").onclick = async () => {
    const val = document.getElementById("promoInput").value.trim(), res = document.getElementById("promoResult");
    if (!val) return;
    try { const r = await api("/api/activate-promocode", {code:val}); res.innerHTML=`✅ ${r.reward}`; res.className="promo-result success"; if(r.newBalance) {state.balance=r.newBalance; updateUI();} }
    catch(e) { res.innerHTML=`❌ ${e.message}`; res.className="promo-result error"; }
    res.classList.remove("hidden");
  };
  if(state.isAdmin) loadPromos();
}

async function createPromo() {
  try { await api("/api/admin/create-promocode", {code:document.getElementById("admC").value, rewardType:document.getElementById("admT").value, rewardId:document.getElementById("admR").value, maxUses:100}); loadPromos(); } catch(e){alert(e.message);}
}
async function loadPromos() {
  try {
    const r = await api("/api/admin/get-promocodes");
    document.getElementById("admList").innerHTML = r.promocodes.map(p=>`<div class="admin-promo-item"><div><b>${p.code}</b><br><span style="font-size:12px;color:#888">${p.rewardType}:${p.rewardId} (${p.uses}/${p.maxUses})</span></div><button class="admin-promo-del" onclick="delPromo('${p.code}')">✕</button></div>`).join("");
  } catch(e){}
}
async function delPromo(c) { if(confirm('Удалить?')){ await api("/api/admin/delete-promocode",{code:c}); loadPromos(); } }

function renderCases() {
  const s = document.getElementById("sectionCases"), cats = Object.entries(state.cases);
  if(!cats.length) return s.innerHTML = "<p>Загрузка...</p>";
  
  s.innerHTML = `<div class="section-header"><div class="section-title">🎰 Кейсы</div></div>
    <div class="case-categories">${cats.map(([k,c])=>`<button class="cat-btn ${k===state.currentCategory?'active':''}" onclick="setCat('${k}')">${c.title}</button>`).join("")}</div>
    <div class="case-grid" id="caseGrid"></div>`;
  renderCaseGrid();
}
window.setCat = (k) => { state.currentCategory = k; renderCases(); };

function renderCaseGrid() {
  const grid = document.getElementById("caseGrid"), cat = state.cases[state.currentCategory];
  if(!cat) return;
  grid.innerHTML = cat.cases.map(c => `
    <div class="case-card ${c.category}" onclick="openCase('${c.id}')">
      <div class="case-icon">${c.type==='stars'?ICONS.starCase:(c.category==='cheap'?ICONS.box:ICONS.diamond)}</div>
      <div class="case-name">${c.title}</div>
      <div class="case-price-row">${ICONS.star}${c.price}</div>
      ${c.has_multiplier?'<div class="case-badge jackpot">x3</div>':''}${c.pity_enabled?'<div class="case-badge pity">ГАРАНТ</div>':''}
    </div>
  `).join("");
}

window.openCase = (id) => {
  const cat = state.cases[state.currentCategory];
  const c = cat.cases.find(x=>x.id===id); if(!c) return;
  state.selectedCase = c;
  document.getElementById("choiceIcon").innerHTML = c.type==='stars'?ICONS.starCase:(c.category==='cheap'?ICONS.box:ICONS.diamond);
  document.getElementById("choiceTitle").textContent = c.title;
  document.getElementById("choicePriceStars").textContent = c.price;
  document.getElementById("choicePriceBalance").textContent = c.price;
  document.getElementById("choiceBalance").classList.toggle("disabled", state.balance < c.price);
  document.getElementById("caseChoiceModal").classList.remove("hidden");
};

document.getElementById("choiceCancel").onclick = () => document.getElementById("caseChoiceModal").classList.add("hidden");
document.getElementById("choiceStars").onclick = async () => {
  document.getElementById("caseChoiceModal").classList.add("hidden");
  try {
    const r = await api("/api/create-invoice", {caseId:state.selectedCase.id});
    if(r.link && tg) tg.openInvoice(r.link, async (s) => {
      if(s==='paid') {
        setTimeout(async()=>{
          try { const res = await api("/api/get-case-result",{paymentId:r.paymentId}); state.balance=res.newBalance; state.pitySpent=res.pitySpent||0; updateUI(); showRoulette(state.selectedCase, res); }
          catch(e){ alert("Результат в боте!"); loadApp(); }
        }, 500);
      }
    });
  } catch(e){alert(e.message);}
};
document.getElementById("choiceBalance").onclick = async () => {
  document.getElementById("caseChoiceModal").classList.add("hidden");
  try { const r = await api("/api/buy-with-balance", {caseId:state.selectedCase.id}); state.balance=r.newBalance; state.pitySpent=r.pitySpent||0; updateUI(); showRoulette(state.selectedCase, r); } catch(e){alert(e.message);}
};

function renderGifts() {
  document.getElementById("sectionGifts").innerHTML = `<div class="section-header"><div class="section-title">🎁 Подарки</div></div>
    <div class="gift-grid">${state.gifts.map(g=>`<div class="gift-card" onclick="openGift('${g.id}')"><div class="gift-img"><img src="${g.gif_url}"></div><div class="gift-price">${ICONS.star}${g.price}</div></div>`).join("")}</div>`;
}

window.openGift = (id) => {
  const g = state.gifts.find(x=>x.id===id); if(!g) return;
  state.selectedGift = g; state.addSignature = false; state.sender = "@echoaxxs";
  document.getElementById("giftDetailImg").src = g.gif_url; document.getElementById("giftDetailTitle").textContent = g.title;
  document.getElementById("signatureSwitch").classList.remove("on");
  const sDiv = document.getElementById("senderOptions");
  sDiv.innerHTML = SENDERS.map(s=>`<div class="sender-option ${s.key===state.sender?'selected':''}" onclick="setSender('${s.key}')"><span style="font-weight:500">${s.label}</span><span style="color:var(--gold);font-weight:600">+${s.cost}⭐</span></div>`).join("");
  sDiv.classList.remove("show"); updateGiftTotal();
  document.getElementById("giftDetailModal").classList.remove("hidden");
};
document.getElementById("signatureToggle").onclick = () => {
  state.addSignature = !state.addSignature;
  document.getElementById("signatureSwitch").classList.toggle("on", state.addSignature);
  document.getElementById("senderOptions").classList.toggle("show", state.addSignature);
  updateGiftTotal();
};
window.setSender = (k) => { state.sender = k; document.querySelectorAll(".sender-option").forEach(e=>e.classList.toggle("selected", e.getAttribute("onclick").includes(k))); updateGiftTotal(); };
function updateGiftTotal() {
  const c = state.selectedGift.price + (state.addSignature ? SENDERS.find(x=>x.key===state.sender).cost : 0);
  document.getElementById("giftTotalAmount").textContent = c; document.getElementById("giftBuyStarsAmount").textContent = c; document.getElementById("giftBuyBalanceAmount").textContent = c;
  document.getElementById("giftBuyBalance").classList.toggle("disabled", state.balance < c);
}

document.getElementById("giftBuyStars").onclick = async () => {
  try {
    const r = await api("/api/create-invoice", {giftId:state.selectedGift.id, sender:state.addSignature?state.sender:null});
    if(r.link && tg) tg.openInvoice(r.link, s=>{ if(s==='paid'){ document.getElementById("giftDetailModal").classList.add("hidden"); tg.showAlert("Отправлено!"); }});
  } catch(e){alert(e.message);}
};
document.getElementById("giftBuyBalance").onclick = async () => {
  try {
    const r = await api("/api/buy-with-balance", {giftId:state.selectedGift.id, sender:state.addSignature?state.sender:null});
    state.balance=r.newBalance; updateUI(); document.getElementById("giftDetailModal").classList.add("hidden");
    tg ? tg.showAlert(`🎉 ${r.reward} отправлен!`) : alert(`🎉 ${r.reward} отправлен!`);
  } catch(e){alert(e.message);}
};

document.getElementById("giftDetailModal").onclick = (e) => { if(e.target.id==="giftDetailModal") e.target.classList.add("hidden"); };
document.getElementById("caseChoiceModal").onclick = (e) => { if(e.target.id==="caseChoiceModal") e.target.classList.add("hidden"); };

function showRoulette(c, r) {
  const over = document.getElementById("rouletteOverlay"), strip = document.getElementById("rouletteStrip"), res = document.getElementById("rouletteResult"), btn = document.getElementById("rouletteClose");
  over.classList.remove("hidden"); res.textContent = ""; res.className = ""; btn.classList.add("hidden"); btn.className="choice-btn cancel hidden";
  document.getElementById("rouletteTitle").innerHTML = `${c.type==='stars'?ICONS.starCase:ICONS.box}<span>${c.title}</span>`;
  
  let items = [];
  if(c.type==='stars') {
    const d = r.allDrops || c.possible_drops || []; const w = r.starsWon || 0;
    for(let i=0;i<50;i++) items.push({t:"star", s:d[Math.floor(Math.random()*d.length)]?.stars||10}); items[38] = {t:"star", s:w};
  } else {
    const g = (c.possible_drops||[]).map(x=>state.gifts.find(y=>y.id===x.gift_id)).filter(Boolean);
    for(let i=0;i<50;i++) items.push(Math.random()<0.3||!g.length ? {t:"none"} : {t:"gift", g:g[Math.floor(Math.random()*g.length)]});
    if(r.type==="nothing") items[38] = {t:"none"};
    else if(r.pityTriggered) items[38] = {t:"gift", g:state.gifts.find(x=>x.id==="heart")||state.gifts[0]};
    else if(r.won?.length) items[38] = {t:"gift", g:state.gifts.find(x=>x.title===r.won[0].title)};
  }
  
  strip.innerHTML = items.map(i => {
    if(i.t==="star") return `<div class="r-item star"><div class="r-img">${ICONS.star}</div><div class="r-label">Stars</div><div class="r-value">${ICONS.star}${i.s}</div></div>`;
    if(i.t==="none") return `<div class="r-item" style="background:var(--card2)"><div class="r-img">${ICONS.nothing}</div><div class="r-label" style="color:var(--text3)">Пусто</div><div class="r-value" style="color:var(--text3)">---</div></div>`;
    return `<div class="r-item"><div class="r-img"><img src="${i.g.gif_url}"></div><div class="r-label">${i.g.title}</div><div class="r-value">${ICONS.star}${i.g.price}</div></div>`;
  }).join("");
  
  strip.style.transition = "none"; strip.style.transform = "translateX(0)";
  setTimeout(() => {
    const cw = document.querySelector('.roulette-window').offsetWidth;
    const itemW = 100, gap = 8, adv = itemW+gap, target = (cw/2) - (4 + 38*adv + itemW/2) + (Math.random()*80-40);
    strip.style.transition = "transform 5s cubic-bezier(0.1, 0.9, 0.2, 1)";
    strip.style.transform = `translateX(${target}px)`;
  }, 100);
  
  setTimeout(() => {
    if(c.type==='stars') { res.innerHTML = `${ICONS.star}<span>+${r.starsWon} Stars!</span>`; res.style.color="var(--gold)"; res.style.fontSize="24px"; btn.className="choice-btn stars"; btn.textContent="Забрать!"; }
    else if(r.type==="nothing") { res.innerHTML = `${ICONS.close}<span>Ничего...</span>`; res.style.color="var(--text3)"; btn.textContent="Закрыть"; }
    else if(r.pityTriggered) { res.innerHTML = `🎁<span>Гарантированный подарок!</span>`; res.style.color="var(--green)"; btn.className="choice-btn"; btn.style.background="var(--green)"; btn.textContent="Круто!"; }
    else { res.innerHTML = `${ICONS.check}<span>${r.won[0].title}!</span>`; res.style.color="var(--green)"; btn.className="choice-btn"; btn.style.background="var(--green)"; btn.textContent="Забрать!"; }
    btn.classList.remove("hidden");
  }, 5200);
}
document.getElementById("rouletteClose").onclick = () => { document.getElementById("rouletteOverlay").classList.add("hidden"); renderCases(); };

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
</body>
</html>
