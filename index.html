<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Подарочница</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #dc2626;
      --primary-glow: rgba(220, 38, 38, 0.4);
      --secondary: #991b1b;
      --secondary-glow: rgba(153, 27, 27, 0.4);
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-orange: #f97316;
      --accent-pink: #ec4899;
      --accent-gold: #fbbf24;
      --bg-dark: #0a0a0a;
      --bg-card: #141414;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --text: #fff;
      --text-dim: #a1a1a1;
      --text-muted: #666;
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.2);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
    html, body { width: 100%; min-height: 100vh; font-family: var(--font-main); background: var(--bg-dark); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .app { position: relative; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: calc(70px + env(safe-area-inset-bottom)); }
    .hidden { display: none !important; }

    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; padding-top: env(safe-area-inset-top); background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .balance-pill { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 20px; font-size: 14px; font-weight: 700; color: var(--accent-gold); }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; display: flex; justify-content: space-around; align-items: center; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 8px 4px calc(8px + env(safe-area-inset-bottom)); }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 12px; background: none; border: none; border-radius: var(--radius-sm); color: var(--text-muted); font-family: inherit; font-size: 10px; font-weight: 600; cursor: pointer; }
    .nav-btn:active { transform: scale(0.95); }
    .nav-btn i { font-size: 18px; }
    .nav-btn.active { color: var(--primary); }

    .section { width: 100%; padding: 16px; padding-top: calc(76px + env(safe-area-inset-top)); animation: fadeIn 0.2s ease-out; }
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-head h2 { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
    .section-head h2 i { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
    .section-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
    .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .card-head i { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
    .card-head h3 { font-size: 15px; font-weight: 600; }
    .card-head p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); }
    .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

    .promo-row { display: flex; gap: 8px; align-items: center; }
    .promo-input { flex: 1; height: 48px; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-size: 15px; font-family: inherit; font-weight: 600; color: var(--text); text-transform: uppercase; }
    .promo-input:focus { outline: none; border-color: var(--primary); }
    .promo-input::placeholder { text-transform: none; color: var(--text-muted); font-weight: 400; }
    .promo-btn { width: 48px; height: 48px; flex-shrink: 0; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .promo-btn:active { transform: scale(0.95); }
    .promo-result { margin-top: 12px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .promo-result.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--accent-green); }
    .promo-result.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); }

    .filters-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding: 2px 0; scrollbar-width: none; }
    .filters-row::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 16px; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text-dim); cursor: pointer; }
    .filter-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; color: #fff; }

    .gifts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .gift-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 6px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; position: relative; }
    .gift-card:active { transform: scale(0.97); background: var(--bg-hover); }
    .gift-card.limited { border-color: var(--accent-pink); }
    .gift-card.sold-out { opacity: 0.4; pointer-events: none; }
    .gift-card.unavailable { opacity: 0.5; }
    .limited-tag { position: absolute; top: 4px; right: 4px; padding: 2px 5px; background: var(--accent-pink); border-radius: 4px; font-size: 8px; font-weight: 700; color: #fff; }
    .sold-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); padding: 4px 8px; background: rgba(0,0,0,0.85); border-radius: 4px; font-size: 8px; font-weight: 700; color: var(--accent-red); }

    .gift-visual { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
    .gift-visual .emoji { font-size: 40px; }
    .gift-visual img { width: 100%; height: 100%; object-fit: contain; }

    .gift-price { display: flex; align-items: center; gap: 3px; font-size: 13px; font-weight: 700; color: var(--accent-gold); padding: 3px 8px; background: rgba(251,191,36,0.1); border-radius: 6px; }
    .gift-price i { font-size: 10px; }

    .case-tabs { display: flex; gap: 4px; margin-bottom: 12px; background: #1a1a1a; border-radius: var(--radius-sm); padding: 3px; }
    .case-tab { flex: 1; padding: 10px 8px; background: transparent; border: none; border-radius: var(--radius-xs); font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .case-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

    .cases-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .case-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
    .case-card:active { transform: scale(0.97); }
    .case-card.cheap { border-top: 2px solid var(--accent-green); }
    .case-card.gifts { border-top: 2px solid var(--primary); }
    .case-card.stars { border-top: 2px solid var(--accent-gold); }
    .case-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; }
    .case-card.cheap .case-icon { background: linear-gradient(135deg, var(--accent-green), #16a34a); }
    .case-card.stars .case-icon { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); }
    .case-name { font-size: 14px; font-weight: 600; text-align: center; }
    .case-price { display: flex; align-items: center; gap: 4px; font-size: 16px; font-weight: 700; color: var(--accent-gold); }

    .donate-hero { text-align: center; padding: 16px 0 8px; }
    .donate-visual { width: 70px; height: 70px; margin: 0 auto 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
    .donate-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
    .donate-desc { font-size: 13px; color: var(--text-dim); max-width: 280px; margin: 0 auto; line-height: 1.4; }
    .donate-amounts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 20px 0; }
    .donate-amt { height: 44px; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; gap: 4px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
    .donate-amt.selected { border-color: var(--primary); background: rgba(220,38,38,0.1); color: var(--primary); }
    .donate-custom { display: flex; align-items: center; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 16px; }
    .donate-custom:focus-within { border-color: var(--primary); }
    .donate-custom input { flex: 1; height: 40px; background: transparent; border: none; padding: 0 12px; font-family: inherit; font-size: 16px; font-weight: 600; color: var(--text); }
    .donate-custom input:focus { outline: none; }
    .donate-custom input::placeholder { color: var(--text-muted); font-weight: 400; }
    .donate-custom span { padding: 0 12px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
    .donate-send { width: 100%; height: 48px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .donate-send:active { transform: scale(0.98); }

    .admin-card { background: var(--bg-card); border: 1px solid rgba(220,38,38,0.3); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .admin-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(220,38,38,0.08); border-bottom: 1px solid rgba(220,38,38,0.2); }
    .admin-head i { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
    .admin-body { padding: 16px; }
    .admin-field { margin-bottom: 12px; }
    .admin-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-input, .admin-select, .admin-textarea { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; font-family: inherit; font-size: 13px; color: var(--text); }
    .admin-input, .admin-select { height: 44px; }
    .admin-textarea { padding: 12px; min-height: 80px; resize: vertical; }
    .admin-input:focus, .admin-select:focus, .admin-textarea:focus { outline: none; border-color: var(--primary); }
    .admin-btn { height: 44px; width: 100%; padding: 0 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; }
    .admin-btn:active { transform: scale(0.98); }
    .promo-list { margin-top: 16px; }
    .promo-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
    .promo-item-code { font-family: monospace; font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .promo-item-meta { font-size: 10px; color: var(--text-muted); }
    .promo-item-del { width: 34px; height: 34px; background: rgba(239,68,68,0.1); border: none; border-radius: var(--radius-xs); color: var(--accent-red); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }

    .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.15s ease-out; }
    .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 340px; max-height: 80vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; }
    .modal-body { padding: 24px 20px; }

    .subscribe-visual { width: 64px; height: 64px; margin: 0 auto 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
    .subscribe-title { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .subscribe-desc { text-align: center; font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
    .channel-item { display: flex; align-items: center; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); border-radius: var(--radius-sm); text-decoration: none; color: var(--text); margin-bottom: 8px; }

    .gift-detail-visual { width: 120px; height: 120px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
    .gift-detail-visual .emoji { font-size: 64px; }
    .gift-detail-visual img { width: 100%; height: 100%; object-fit: contain; }
    .gift-detail-price { text-align: center; font-size: 24px; font-weight: 700; color: var(--accent-gold); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }

    .action-btns { display: flex; gap: 8px; }
    .action-btn { flex: 1; height: 46px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .action-btn:active { transform: scale(0.97); }
    .action-btn.primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .action-btn.balance { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); color: #000; }
    .action-btn.disabled { opacity: 0.4; pointer-events: none; }

    .case-modal-icon { width: 72px; height: 72px; margin: 0 auto 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 36px; color: #fff; }
    .case-modal-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .choice-btn { width: 100%; height: 48px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .choice-btn.stars { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .choice-btn.balance { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); color: #000; }
    .choice-btn.balance.disabled { opacity: 0.4; pointer-events: none; }

    .roulette-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .roulette-box { width: 100%; max-width: 360px; }
    .roulette-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .roulette-window { position: relative; height: 140px; overflow: hidden; border-radius: var(--radius); background: var(--bg-card); border: 1px solid var(--border); }
    .roulette-pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; transform: translateX(-50%); z-index: 10; }
    .roulette-pointer::before, .roulette-pointer::after { content: ''; position: absolute; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; }
    .roulette-pointer::before { top: 0; border-top: 10px solid #fff; }
    .roulette-pointer::after { bottom: 0; border-bottom: 10px solid #fff; }
    .roulette-strip { display: flex; height: 100%; align-items: center; gap: 8px; padding: 0 4px; will-change: transform; }
    .r-item { width: 90px; height: 120px; flex-shrink: 0; background: #1a1a1a; border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 8px; border: 1px solid var(--border); }
    .r-item.star-item { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); border: none; color: #000; }
    .r-visual { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
    .r-visual .emoji { font-size: 32px; }
    .r-price { display: flex; align-items: center; gap: 3px; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .roulette-result { text-align: center; margin-top: 20px; font-size: 18px; font-weight: 700; min-height: 28px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .roulette-result.win { color: var(--accent-green); }
    .roulette-result.lose { color: var(--text-muted); font-weight: 500; }
    .roulette-result.stars { color: var(--accent-gold); font-size: 22px; }
    .roulette-close { width: 100%; height: 48px; margin-top: 16px; border-radius: var(--radius-sm); border: none; background: #1a1a1a; color: var(--text); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .roulette-close.success { background: var(--accent-green); color: #000; }

    .loading-state { text-align: center; }
    .loading-icon { width: 60px; height: 60px; margin: 0 auto 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; }
    .loading-text { font-size: 16px; font-weight: 600; }
  </style>
</head>

<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-gift"></i></div>
      <span class="logo-text">Подарочница</span>
    </div>
    <div class="balance-pill"><i class="fas fa-star"></i><span id="balanceValue">0</span></div>
  </header>

  <div class="section" id="sectionHome"></div>
  <div class="section hidden" id="sectionCases"></div>
  <div class="section hidden" id="sectionGifts"></div>
  <div class="section hidden" id="sectionDonate"></div>
  <div class="section hidden" id="sectionAdmin"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="Home"><i class="fas fa-home"></i><span>Главная</span></button>
    <button class="nav-btn" data-tab="Cases"><i class="fas fa-dice"></i><span>Кейсы</span></button>
    <button class="nav-btn" data-tab="Gifts"><i class="fas fa-gift"></i><span>Подарки</span></button>
    <button class="nav-btn" data-tab="Donate"><i class="fas fa-heart"></i><span>Донат</span></button>
    <button class="nav-btn hidden" data-tab="Admin" id="adminTab"><i class="fas fa-shield-alt"></i><span>Админ</span></button>
  </nav>
</div>

<div class="modal-overlay hidden" id="subscribeModal">
  <div class="modal-box"><div class="modal-body">
    <div class="subscribe-visual"><i class="fas fa-bell"></i></div>
    <div class="subscribe-title">Подпишись на каналы</div>
    <div class="subscribe-desc">Для использования бота нужна подписка</div>
    <div id="channelList"></div>
    <button class="choice-btn stars" id="checkSubBtn"><i class="fas fa-check-circle"></i> Проверить</button>
  </div></div>
</div>

<div class="modal-overlay hidden" id="giftModal">
  <div class="modal-box">
    <button class="modal-close" id="closeGiftModal"><i class="fas fa-times"></i></button>
    <div class="modal-body">
      <div class="gift-detail-visual" id="giftModalVisual"></div>
      <div class="gift-detail-price" id="giftModalPrice"></div>
      <div class="action-btns">
        <button class="action-btn primary" id="buyWithStars"><i class="fas fa-star"></i><span id="starsPrice">0</span></button>
        <button class="action-btn balance" id="buyWithBalance">Баланс <span id="balancePrice">0</span></button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="caseModal">
  <div class="modal-box">
    <button class="modal-close" id="closeCaseModal"><i class="fas fa-times"></i></button>
    <div class="modal-body">
      <div class="case-modal-icon" id="caseModalIcon"><i class="fas fa-box-open"></i></div>
      <div class="case-modal-title" id="caseModalTitle"></div>
      <button class="choice-btn stars" id="caseStarsBtn"><i class="fas fa-star"></i> <span id="caseStarsPrice">0</span> Stars</button>
      <button class="choice-btn balance" id="caseBalanceBtn"><i class="fas fa-wallet"></i> <span id="caseBalancePrice">0</span> С баланса</button>
    </div>
  </div>
</div>

<div class="roulette-overlay hidden" id="rouletteOverlay">
  <div class="loading-state hidden" id="rouletteLoading">
    <div class="loading-icon"><i class="fas fa-dice"></i></div>
    <div class="loading-text">Открываем кейс...</div>
  </div>
  <div class="roulette-box hidden" id="rouletteContent">
    <div class="roulette-title" id="rouletteTitle"></div>
    <div class="roulette-window">
      <div class="roulette-pointer"></div>
      <div class="roulette-strip" id="rouletteStrip"></div>
    </div>
    <div class="roulette-result" id="rouletteResult"></div>
    <button class="roulette-close hidden" id="rouletteClose">Закрыть</button>
  </div>
</div>

<div class="modal-overlay hidden" id="maintenanceModal">
  <div class="modal-box"><div class="modal-body" style="text-align:center;">
    <div class="subscribe-visual" style="background:linear-gradient(135deg,var(--accent-orange),var(--accent-red));"><i class="fas fa-tools"></i></div>
    <div class="subscribe-title">Технический перерыв</div>
    <div id="maintenanceText" style="color:var(--text-dim);font-size:13px;line-height:1.5;"></div>
  </div></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
const API = "https://podarochnica-api.onrender.com";

const state = {
  balance: 0, pitySpent: 0, pityThreshold: 20, isAdmin: false, subscribed: true,
  channels: [], gifts: [], adminGifts: [], adminCases: [], cases: {}, sales: [], promocodes: [],
  selectedGift: null, selectedCase: null,
  currentCategory: "cheap", giftFilter: "all",
  defaultSignature: ""
};

const DONATE_AMOUNTS = [10, 25, 50, 100, 250, 500];

const api = async (ep, data = {}) => {
  const res = await fetch(`${API}${ep}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ initData: tg?.initData || "", ...data }) });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || `HTTP ${res.status}`); }
  return res.json();
};
const apiGet = async (ep) => { const res = await fetch(`${API}${ep}`); if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); };
const $ = id => document.getElementById(id);
const updateBalance = () => { $("balanceValue").textContent = state.balance.toLocaleString(); };
const showModal = id => $(id).classList.remove("hidden");
const hideModal = id => $(id).classList.add("hidden");

const renderGiftVisual = (gift, size = 64) => {
  if (!gift) return '<span class="emoji">🎁</span>';
  if (gift.sticker_url && gift.sticker_type === 'webp') {
    return `<img src="${gift.sticker_url}" alt="" style="width:${size}px;height:${size}px;">`;
  }
  return `<span class="emoji" style="font-size:${size*0.6}px;">${gift.emoji || '🎁'}</span>`;
};

const init = async () => {
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }
  try {
    const sub = await api("/api/check-subscription");
    state.subscribed = sub.subscribed;
    state.channels = sub.channels || [];
    if (sub.maintenance) { $("maintenanceText").textContent = sub.message; showModal("maintenanceModal"); return; }
    if (!state.subscribed && state.channels.length > 0) { renderChannels(); showModal("subscribeModal"); return; }
  } catch (e) { alert("Ошибка: " + e.message); return; }
  await loadApp();
};

const loadApp = async () => {
  try {
    const [u, g, c] = await Promise.all([
      api("/api/get-user-data"),
      apiGet("/api/get-gifts").catch(() => ({ gifts: [], sales: [] })),
      apiGet("/api/get-cases").catch(() => ({ categories: {} }))
    ]);
    state.balance = u.starBalance || 0;
    state.pitySpent = u.pitySpent || 0;
    state.pityThreshold = u.pityThreshold || 20;
    state.isAdmin = u.isAdmin || false;
    state.defaultSignature = u.defaultSignature || "";
    state.gifts = g.gifts || [];
    state.sales = g.sales || [];
    state.cases = c.categories || {};
    if (state.isAdmin) {
      try { const ad = await apiGet("/api/admin/get-gifts-list"); state.adminGifts = ad.gifts || []; state.adminCases = ad.cases || []; } catch(e) {}
    }
  } catch (e) {
    if (String(e.message).includes("перерыв")) { $("maintenanceText").textContent = e.message; showModal("maintenanceModal"); return; }
    alert("Ошибка: " + e.message); return;
  }
  if (state.isAdmin) $("adminTab").classList.remove("hidden");
  renderHome(); renderCases(); renderGifts(); renderDonate();
  if (state.isAdmin) renderAdmin();
  setupTabs(); updateBalance();
};

const renderChannels = () => {
  $("channelList").innerHTML = state.channels.map(ch => `
    <a href="${ch.link || '#'}" target="_blank" class="channel-item">
      <div><div style="font-weight:600;">${ch.title || ch.id}</div>
      <div style="font-size:11px;color:${ch.missing ? 'var(--accent-red)' : 'var(--accent-green)'};">${ch.missing ? 'Нужна подписка' : '✓ Подписан'}</div></div>
    </a>
  `).join("");
};

$("checkSubBtn").onclick = async function() {
  this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Проверяем...'; this.disabled = true;
  try {
    const sub = await api("/api/check-subscription");
    if (sub.maintenance) { hideModal("subscribeModal"); $("maintenanceText").textContent = sub.message; showModal("maintenanceModal"); return; }
    if (sub.subscribed) { hideModal("subscribeModal"); await loadApp(); }
    else { state.channels = sub.channels || []; renderChannels(); }
  } catch(e) {}
  this.innerHTML = '<i class="fas fa-check-circle"></i> Проверить'; this.disabled = false;
};

const setupTabs = () => {
  const s = { Home: "sectionHome", Cases: "sectionCases", Gifts: "sectionGifts", Donate: "sectionDonate", Admin: "sectionAdmin" };
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b === btn));
      Object.entries(s).forEach(([k, id]) => $(id)?.classList.toggle('hidden', k !== btn.dataset.tab));
      updateBalance();
    };
  });
};

// === HOME ===
const renderHome = () => {
  $("sectionHome").innerHTML = `
    <div class="section-head"><div><h2><i class="fas fa-home"></i> Главная</h2><div class="section-subtitle">Промокоды</div></div></div>
    <div class="card">
      <div class="card-head"><i class="fas fa-ticket-alt"></i><div><h3>Промокод</h3><p>Введите код для получения награды</p></div></div>
      <div class="promo-row"><input type="text" class="promo-input" id="promoInput" placeholder="Введите код"><button class="promo-btn" id="promoBtn"><i class="fas fa-arrow-right"></i></button></div>
      <div class="promo-result hidden" id="promoResult"></div>
    </div>`;

  $("promoBtn").onclick = async () => {
    const code = $("promoInput").value.trim(); if (!code) return;
    $("promoBtn").disabled = true; $("promoBtn").innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
      const r = await api("/api/activate-promocode", { code });
      $("promoResult").innerHTML = `<i class="fas fa-check-circle"></i> ${r.reward}`;
      $("promoResult").className = "promo-result success";
      if (typeof r.newBalance !== "undefined") { state.balance = r.newBalance; updateBalance(); }
      $("promoInput").value = "";
    } catch (e) { $("promoResult").innerHTML = `<i class="fas fa-times-circle"></i> ${e.message}`; $("promoResult").className = "promo-result error"; }
    $("promoResult").classList.remove("hidden");
    $("promoBtn").disabled = false; $("promoBtn").innerHTML = '<i class="fas fa-arrow-right"></i>';
  };
};

// === GIFTS ===
const renderGifts = () => {
  const filters = [
    { key: "all", label: "Все", icon: "fa-th" },
    { key: "available", label: "Доступные", icon: "fa-check-circle" },
    { key: "limited", label: "Лимит", icon: "fa-fire" }
  ];
  const filtered = state.gifts.filter(g => {
    if (state.giftFilter === "available") return g.available && !g.sold_out;
    if (state.giftFilter === "limited") return g.is_limited || g.is_unknown;
    return true;
  });

  $("sectionGifts").innerHTML = `
    <div class="section-head"><div><h2><i class="fas fa-gift"></i> Подарки</h2><div class="section-subtitle">${state.gifts.filter(g=>g.available).length} доступно</div></div></div>
    <div class="filters-row">${filters.map(f => `<button class="filter-btn ${state.giftFilter === f.key ? 'active' : ''}" onclick="setGiftFilter('${f.key}')"><i class="fas ${f.icon}"></i> ${f.label}</button>`).join("")}</div>
    <div class="gifts-grid">${filtered.map(g => `
      <div class="gift-card ${g.is_limited||g.is_unknown?'limited':''} ${g.sold_out?'sold-out':''} ${!g.available?'unavailable':''}" onclick="${g.available?`openGift('${g.id}')`:''}">
        ${g.is_limited||g.is_unknown?'<div class="limited-tag">Лимит</div>':''}
        ${g.sold_out?'<div class="sold-tag">Распродан</div>':''}
        <div class="gift-visual">${renderGiftVisual(g)}</div>
        <div class="gift-price"><i class="fas fa-star"></i> ${g.price}</div>
      </div>
    `).join("")}</div>`;
};

window.setGiftFilter = f => { state.giftFilter = f; renderGifts(); };

window.openGift = id => {
  const g = state.gifts.find(x => x.id === id);
  if (!g || g.sold_out || !g.available) return;
  state.selectedGift = g;
  $("giftModalVisual").innerHTML = renderGiftVisual(g, 100);
  $("giftModalPrice").innerHTML = `<i class="fas fa-star"></i> ${g.price} Stars`;
  $("starsPrice").textContent = g.price;
  $("balancePrice").textContent = g.price;
  $("buyWithBalance").classList.toggle("disabled", state.balance < g.price);
  showModal("giftModal");
};

$("closeGiftModal").onclick = () => hideModal("giftModal");

$("buyWithStars").onclick = async () => {
  if (!state.selectedGift) return;
  try {
    const r = await api("/api/create-invoice", { giftId: state.selectedGift.id });
    if (r.link && tg) tg.openInvoice(r.link, s => { if (s==='paid') { hideModal("giftModal"); tg.showAlert("🎉 Подарок отправлен!"); }});
  } catch(e) { alert(e.message); }
};
$("buyWithBalance").onclick = async () => {
  if (!state.selectedGift) return;
  try {
    const r = await api("/api/buy-with-balance", { giftId: state.selectedGift.id });
    state.balance = r.newBalance; updateBalance(); hideModal("giftModal");
    tg ? tg.showAlert(`🎉 ${r.reward}!`) : alert(`🎉 ${r.reward}!`);
  } catch(e) { alert(e.message); }
};

// === CASES ===
const renderCases = () => {
  const cats = Object.entries(state.cases);
  if (!cats.length) { $("sectionCases").innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>Загрузка...</p></div>'; return; }
  const icons = { cheap:'fa-coins', gifts:'fa-gem', stars:'fa-star' };
  $("sectionCases").innerHTML = `
    <div class="section-head"><div><h2><i class="fas fa-dice"></i> Кейсы</h2><div class="section-subtitle">Испытай удачу!</div></div></div>
    <div class="case-tabs">${cats.map(([k,c])=>`<button class="case-tab ${k===state.currentCategory?'active':''}" onclick="setCaseCategory('${k}')"><i class="fas ${icons[k]||'fa-box'}"></i> ${c.title.split(' ')[0]}</button>`).join("")}</div>
    <div class="cases-grid" id="casesGrid"></div>`;
  renderCasesGrid();
};
const renderCasesGrid = () => {
  const cat = state.cases[state.currentCategory]; if (!cat) return;
  const icons = { cheap:'fa-box', gifts:'fa-gem', stars:'fa-star' };
  $("casesGrid").innerHTML = cat.cases.map(c => `
    <div class="case-card ${c.category}" onclick="openCase('${c.id}')">
      <div class="case-icon"><i class="fas ${icons[c.category]||'fa-box-open'}"></i></div>
      <div class="case-name">${c.title}</div>
      <div class="case-price"><i class="fas fa-star"></i> ${c.price}</div>
    </div>`).join("");
};
window.setCaseCategory = k => { state.currentCategory = k; renderCases(); };
window.openCase = id => {
  const cat = state.cases[state.currentCategory]; const c = cat?.cases.find(x=>x.id===id); if(!c) return;
  state.selectedCase = c;
  const icons = { cheap:'fa-box', gifts:'fa-gem', stars:'fa-star' };
  $("caseModalIcon").innerHTML = `<i class="fas ${icons[c.category]||'fa-box-open'}"></i>`;
  $("caseModalTitle").textContent = c.title;
  $("caseStarsPrice").textContent = c.price; $("caseBalancePrice").textContent = c.price;
  $("caseBalanceBtn").classList.toggle("disabled", state.balance < c.price);
  showModal("caseModal");
};
$("closeCaseModal").onclick = () => hideModal("caseModal");

$("caseStarsBtn").onclick = async () => {
  hideModal("caseModal");
  try {
    const r = await api("/api/create-invoice", { caseId: state.selectedCase.id });
    if (r.link && tg) tg.openInvoice(r.link, async s => {
      if (s==='paid') { showRouletteLoading(); setTimeout(async()=>{
        try { const res = await api("/api/get-case-result",{paymentId:r.paymentId}); state.balance=res.newBalance; state.pitySpent=res.pitySpent||0; updateBalance(); startRoulette(state.selectedCase,res); }
        catch(e) { hideModal("rouletteOverlay"); alert("Результат в боте!"); await loadApp(); }
      },500);}
    });
  } catch(e) { alert(e.message); }
};
$("caseBalanceBtn").onclick = async () => {
  hideModal("caseModal"); showRouletteLoading();
  try { const r = await api("/api/buy-with-balance",{caseId:state.selectedCase.id}); state.balance=r.newBalance; state.pitySpent=r.pitySpent||0; updateBalance(); startRoulette(state.selectedCase,r); }
  catch(e) { hideModal("rouletteOverlay"); alert(e.message); }
};

const showRouletteLoading = () => { showModal("rouletteOverlay"); $("rouletteLoading").classList.remove("hidden"); $("rouletteContent").classList.add("hidden"); };

const startRoulette = (caseData, result) => {
  $("rouletteLoading").classList.add("hidden"); $("rouletteContent").classList.remove("hidden");
  const strip=$("rouletteStrip"), resultEl=$("rouletteResult"), closeBtn=$("rouletteClose");
  resultEl.textContent=""; resultEl.className="roulette-result"; closeBtn.classList.add("hidden"); closeBtn.className="roulette-close hidden";
  const icons={cheap:'fa-box',gifts:'fa-gem',stars:'fa-star'};
  $("rouletteTitle").innerHTML=`<i class="fas ${icons[caseData.category]||'fa-box-open'}"></i> ${caseData.title}`;
  
  let items=[]; const winIndex=30;
  if (caseData.type==='stars') {
    const drops=result.allDrops||result.all_drops||[];
    for(let i=0;i<40;i++) items.push({type:"star",value:drops.length?drops[Math.floor(Math.random()*drops.length)]?.stars||50:50});
    items[winIndex]={type:"star",value:result.starsWon||result.stars_won||100};
  } else {
    const vg=state.gifts.filter(g=>g.available&&!g.sold_out).slice(0,8);
    const fg=vg.length?vg:state.gifts.slice(0,4);
    for(let i=0;i<40;i++){if(Math.random()<0.25)items.push({type:"nothing"});else items.push({type:"gift",value:fg[Math.floor(Math.random()*fg.length)]});}
    if(result.type==="nothing") items[winIndex]={type:"nothing"};
    else if(result.won?.length){const w=state.gifts.find(g=>g.id===result.won[0].id)||result.won[0]; items[winIndex]={type:"gift",value:w};}
    else if(result.pityTriggered) items[winIndex]={type:"gift",value:state.gifts.find(g=>g.available&&!g.sold_out)||state.gifts[0]};
  }
  
  strip.innerHTML=items.map(item=>{
    if(item.type==="star") return `<div class="r-item star-item"><div class="r-visual"><i class="fas fa-star" style="font-size:28px;color:#000;"></i></div><div class="r-price"><i class="fas fa-star"></i> ${item.value}</div></div>`;
    if(item.type==="nothing") return `<div class="r-item"><div class="r-visual"><i class="fas fa-times" style="font-size:28px;color:var(--text-muted);"></i></div><div class="r-price" style="opacity:0.4;">---</div></div>`;
    return `<div class="r-item"><div class="r-visual"><span class="emoji">${item.value?.emoji||'🎁'}</span></div><div class="r-price"><i class="fas fa-star"></i> ${item.value?.price||'?'}</div></div>`;
  }).join("");
  
  strip.style.transition="none"; strip.style.transform="translateX(0)";
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    const cw=document.querySelector('.roulette-window').offsetWidth;
    const advance=98, itemCenter=4+(winIndex*advance)+45, ro=(Math.random()*60)-30;
    strip.style.transition="transform 3.5s cubic-bezier(0.15,0.85,0.25,1)";
    strip.style.transform=`translateX(${(cw/2)-itemCenter+ro}px)`;
  });});
  
  setTimeout(()=>{
    if(caseData.type==='stars'){const w=result.starsWon||result.stars_won||0;resultEl.innerHTML=`<i class="fas fa-star"></i> +${w} Stars!`;resultEl.classList.add("stars");closeBtn.classList.add("success");closeBtn.textContent="Забрать!";}
    else if(result.type==="nothing"){resultEl.innerHTML='<i class="fas fa-times-circle"></i> Ничего...';resultEl.classList.add("lose");closeBtn.textContent="Закрыть";}
    else{const wp=result.won?.[0]?.price||'?';resultEl.innerHTML=`<i class="fas fa-check-circle"></i> 🎁 ${wp}⭐`;resultEl.classList.add("win");closeBtn.classList.add("success");closeBtn.textContent=result.pityTriggered?"Гарант!":"Круто!";}
    closeBtn.classList.remove("hidden");
  },3700);
};
$("rouletteClose").onclick = () => { hideModal("rouletteOverlay"); renderCases(); };

// === DONATE ===
const renderDonate = () => {
  $("sectionDonate").innerHTML = `
    <div class="section-head"><div><h2><i class="fas fa-heart"></i> Донат</h2><div class="section-subtitle">Поддержи проект</div></div></div>
    <div class="card">
      <div class="donate-hero"><div class="donate-visual"><i class="fas fa-heart"></i></div><div class="donate-title">Поддержите нас!</div><div class="donate-desc">Ваши донаты помогают развивать проект</div></div>
      <div class="donate-amounts">${DONATE_AMOUNTS.map(a=>`<button class="donate-amt" data-amount="${a}"><i class="fas fa-star"></i> ${a}</button>`).join("")}</div>
      <div class="donate-custom"><input type="number" id="donateCustom" placeholder="Другая сумма" min="1" max="10000"><span>Stars</span></div>
      <button class="donate-send" id="donateSend"><i class="fas fa-paper-plane"></i> Отправить</button>
    </div>`;
  let sel=null;
  document.querySelectorAll('.donate-amt').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.donate-amt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');sel=parseInt(b.dataset.amount);$("donateCustom").value='';};});
  $("donateCustom").oninput=()=>{document.querySelectorAll('.donate-amt').forEach(x=>x.classList.remove('selected'));sel=null;};
  $("donateSend").onclick=async()=>{const cv=$("donateCustom").value;const amt=cv?parseInt(cv):sel;if(!amt||amt<1||amt>10000){alert("Сумма от 1 до 10000");return;}try{const r=await api("/api/create-donate",{amount:amt});if(r.link&&tg)tg.openInvoice(r.link,s=>{if(s==='paid')tg.showAlert("💝 Спасибо!");});}catch(e){alert(e.message);}};
};

// === ADMIN ===
const renderAdmin = () => {
  if (!state.isAdmin) return;
  $("sectionAdmin").innerHTML = `
    <div class="section-head"><div><h2 style="color:var(--primary);"><i class="fas fa-shield-alt"></i> Админ</h2></div></div>
    
    <div class="admin-card">
      <div class="admin-head"><i class="fas fa-signature"></i><div><h3>Подпись по умолчанию</h3></div></div>
      <div class="admin-body">
        <div class="admin-field"><label>Текст подписи</label><input class="admin-input" id="admDefSign" placeholder="От @username" value="${state.defaultSignature}"></div>
        <button class="admin-btn" id="admSaveSign"><i class="fas fa-save"></i> Сохранить</button>
      </div>
    </div>
    
    <div class="admin-card">
      <div class="admin-head"><i class="fas fa-plus-circle"></i><div><h3>Создать промокод</h3></div></div>
      <div class="admin-body">
        <div class="admin-field"><label>Код</label><input class="admin-input" id="admCode" placeholder="GIFT2024" style="text-transform:uppercase;"></div>
        <div class="admin-field"><label>Тип</label><select class="admin-select" id="admType"><option value="stars">⭐ Stars</option><option value="gift">🎁 Подарок</option><option value="case">📦 Кейс</option></select></div>
        <div class="admin-field"><label>Награда</label><select class="admin-select" id="admReward"></select></div>
        <div class="admin-field hidden" id="admSignField"><label>Подпись для подарка</label><input class="admin-input" id="admSignText" placeholder="От @username"></div>
        <div class="admin-field"><label>Использований</label><input class="admin-input" id="admMaxUses" type="number" value="100"></div>
        <button class="admin-btn" id="admCreate"><i class="fas fa-plus"></i> Создать</button>
        <div class="promo-list"><div style="font-weight:600;margin:14px 0 10px;">Активные промокоды</div><div id="promoList"></div></div>
      </div>
    </div>`;
  
  const upd=()=>{const t=$("admType").value,s=$("admReward");
    if(t==="stars")s.innerHTML=[10,25,50,100,250,500,1000].map(v=>`<option value="${v}">${v} Stars</option>`).join("");
    else if(t==="gift")s.innerHTML=state.adminGifts.map(g=>`<option value="${g.id}">${g.title}</option>`).join("");
    else s.innerHTML=state.adminCases.map(c=>`<option value="${c.id}">${c.title} (${c.price}⭐)</option>`).join("");
    $("admSignField").classList.toggle("hidden", t !== "gift");
  };
  $("admType").onchange=upd; upd();
  
  $("admSaveSign").onclick=async()=>{
    try{await api("/api/admin/set-default-signature",{signature:$("admDefSign").value});state.defaultSignature=$("admDefSign").value;alert("✅ Сохранено!");}catch(e){alert(e.message);}
  };
  
  $("admCreate").onclick=async()=>{const code=$("admCode").value.trim().toUpperCase();if(!code)return alert("Введите код");
    const signText = $("admType").value === "gift" ? $("admSignText").value.trim() : "";
    try{await api("/api/admin/create-promocode",{code,rewardType:$("admType").value,rewardId:$("admReward").value,maxUses:parseInt($("admMaxUses").value)||100,signatureText:signText});$("admCode").value="";$("admSignText").value="";await loadPromocodes();alert("✅ Создан!");}catch(e){alert(e.message);}};
  loadPromocodes();
};
const loadPromocodes = async () => {
  try{const r=await api("/api/admin/get-promocodes");state.promocodes=r.promocodes||[];const l=$("promoList");if(!l)return;
  if(!state.promocodes.length){l.innerHTML='<div class="empty-state" style="padding:16px;"><p>Нет промокодов</p></div>';return;}
  l.innerHTML=state.promocodes.map(p=>`<div class="promo-item"><div><div class="promo-item-code">${p.code}</div><div class="promo-item-meta">${p.rewardType}: ${p.rewardId} • ${p.uses}/${p.maxUses}${p.signatureText?' • '+p.signatureText:''}</div></div><button class="promo-item-del" onclick="deletePromo('${p.code}')"><i class="fas fa-trash"></i></button></div>`).join("");}catch(e){}};
window.deletePromo = async code => { if(!confirm(`Удалить ${code}?`))return; try{await api("/api/admin/delete-promocode",{code});await loadPromocodes();}catch(e){alert(e.message);}};

if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
</script>
</body>
</html>
