<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>#подарочница</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --bg2: #0a0a0c;
      --card: #1c1c1e;
      --card2: #2c2c2e;
      --card3: #3a3a3c;
      --text: #ffffff;
      --text2: rgba(255,255,255,0.7);
      --text3: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --accent: #0A84FF;
      --accent2: #409CFF;
      --gold: #FFD60A;
      --gold2: #FF9F0A;
      --green: #32D74B;
      --red: #FF453A;
      --purple: #BF5AF2;
      --cyan: #64D2FF;
      --pink: #FF375F;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 15px rgba(255,214,10,0.3); }
      50% { box-shadow: 0 0 25px rgba(255,214,10,0.5); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .app {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      padding-bottom: 90px;
    }

    .hidden { display: none !important; }

    /* === БАЛАНС ВИДЖЕТ (угол) === */
    .balance-widget {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: linear-gradient(135deg, rgba(255,214,10,0.2), rgba(255,159,10,0.15));
      border: 1px solid rgba(255,214,10,0.3);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .balance-widget:active {
      transform: scale(0.95);
    }

    .balance-widget svg {
      width: 16px;
      height: 16px;
      color: var(--gold);
    }

    .balance-widget span {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }

    /* === PITY ПРОГРЕСС === */
    .pity-bar {
      margin: 60px 16px 12px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }

    .pity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .pity-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pity-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
    }

    .pity-track {
      height: 6px;
      background: var(--card2);
      border-radius: 3px;
      overflow: hidden;
    }

    .pity-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* === ПОДПИСКА OVERLAY === */
    .subscribe-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.3s;
    }

    .subscribe-box {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .subscribe-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .subscribe-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subscribe-text {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .subscribe-channels {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .subscribe-channel {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--card2);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .subscribe-channel:active {
      transform: scale(0.98);
      background: var(--card3);
    }

    .subscribe-channel.subscribed {
      border-color: var(--green);
      background: rgba(50,215,75,0.1);
    }

    .channel-icon {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .channel-icon svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .channel-info {
      flex: 1;
      text-align: left;
    }

    .channel-name {
      font-weight: 600;
      font-size: 15px;
    }

    .channel-status {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .channel-status.ok {
      color: var(--green);
    }

    .subscribe-check {
      width: 100%;
      height: 54px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .subscribe-check:active {
      transform: scale(0.98);
    }

    .subscribe-check.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* === НИЖНИЕ ТАБЫ === */
    .bottom-tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(18,18,20,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 50;
    }

    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bottom-tab svg {
      width: 24px;
      height: 24px;
      transition: all 0.2s;
    }

    .bottom-tab.active {
      color: var(--accent);
    }

    .bottom-tab.active svg {
      color: var(--accent);
    }

    /* === СЕКЦИИ === */
    .section {
      padding: 16px 16px 20px;
      animation: fadeIn 0.3s ease-out;
    }

    .section.with-pity {
      padding-top: 8px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-top: 44px;
    }

    .section.with-pity .section-header {
      padding-top: 0;
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* === ГЛАВНАЯ (НОВОСТИ) === */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .news-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .news-img {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, var(--card2), var(--card3));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .news-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .news-img .placeholder {
      font-size: 48px;
    }

    .news-content {
      padding: 16px;
    }

    .news-date {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .news-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .news-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.4;
    }

    /* === ПРОМОКОД === */
    .promo-section {
      margin-top: 8px;
    }

    .promo-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      border: 1px solid var(--border);
    }

    .promo-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .promo-title svg {
      width: 20px;
      height: 20px;
      color: var(--cyan);
    }

    .promo-input-row {
      display: flex;
      gap: 10px;
    }

    .promo-input {
      flex: 1;
      height: 50px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0 16px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

    .promo-input::placeholder {
      text-transform: none;
      letter-spacing: 0;
      color: var(--text3);
      font-weight: 400;
    }

    .promo-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .promo-btn {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .promo-btn:active {
      transform: scale(0.92);
    }

    .promo-btn svg {
      width: 22px;
      height: 22px;
    }

    .promo-result {
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.3s;
    }

    .promo-result svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .promo-result.success {
      background: rgba(50,215,75,0.15);
      color: var(--green);
    }

    .promo-result.error {
      background: rgba(255,69,58,0.15);
      color: var(--red);
    }

    /* === АДМИН ПАНЕЛЬ === */
    .admin-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .admin-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-title svg {
      width: 20px;
      height: 20px;
    }

    .admin-form {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .admin-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .admin-row:last-child {
      margin-bottom: 0;
    }

    .admin-input {
      flex: 1;
      height: 46px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
    }

    .admin-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .admin-select {
      height: 46px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      min-width: 100px;
    }

    .admin-btn {
      height: 46px;
      padding: 0 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .admin-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .admin-promo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      background: var(--card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .admin-promo-code {
      font-weight: 700;
      font-size: 15px;
      font-family: monospace;
    }

    .admin-promo-info {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .admin-promo-del {
      width: 36px;
      height: 36px;
      background: rgba(255,69,58,0.2);
      border: none;
      border-radius: 10px;
      color: var(--red);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-promo-del svg {
      width: 18px;
      height: 18px;
    }

    /* === КЕЙСЫ === */
    .case-categories {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .case-categories::-webkit-scrollbar {
      display: none;
    }

    .cat-btn {
      flex-shrink: 0;
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .case-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .case-card:active {
      transform: scale(0.96);
    }

    .case-card.cheap {
      border-top: 3px solid var(--green);
    }

    .case-card.gifts {
      border-top: 3px solid var(--purple);
    }

    .case-card.stars {
      border-top: 3px solid var(--gold);
      background: linear-gradient(180deg, rgba(255,214,10,0.12) 0%, var(--card) 100%);
      animation: glow 3s infinite;
    }

    .case-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 4px;
    }

    .case-icon svg {
      width: 100%;
      height: 100%;
    }

    .case-name {
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .case-price-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
    }

    .case-price-row svg {
      width: 16px;
      height: 16px;
    }

    .case-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .case-badge.jackpot {
      background: var(--gold2);
      color: #000;
    }

    .case-badge.pity {
      background: var(--green);
      color: #000;
    }

    /* === ПОДАРКИ === */
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .gift-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }

    .gift-card:active {
      transform: scale(0.94);
      background: var(--card2);
    }

    .gift-img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      overflow: hidden;
    }

    .gift-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gift-price {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }

    .gift-price svg {
      width: 14px;
      height: 14px;
    }

    /* === МОДАЛЬНЫЕ ОКНА === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s;
    }

    .modal-box {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      max-width: 340px;
      border: 1px solid var(--border);
      position: relative;
    }

    /* === CASE CHOICE === */
    .case-choice-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
    }

    .case-choice-icon svg {
      width: 100%;
      height: 100%;
    }

    .case-choice-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .case-choice-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 54px;
      border-radius: var(--radius-md);
      border: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .choice-btn:active {
      transform: scale(0.97);
    }

    .choice-btn svg {
      width: 20px;
      height: 20px;
    }

    .choice-btn.stars {
      background: var(--accent);
      color: #fff;
    }

    .choice-btn.balance {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
    }

    .choice-btn.balance.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .choice-btn.cancel {
      background: var(--card2);
      color: var(--text);
    }

    .choice-price {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .choice-price svg {
      width: 18px;
      height: 18px;
    }

    /* === GIFT DETAIL === */
    .gift-detail-preview {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg2);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .gift-detail-preview img {
      width: 55%;
      height: 55%;
      object-fit: contain;
    }

    .gift-detail-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .signature-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--card2);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      cursor: pointer;
    }

    .signature-label {
      font-size: 15px;
      font-weight: 500;
    }

    .signature-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .toggle-switch {
      width: 50px;
      height: 30px;
      background: #39393D;
      border-radius: 30px;
      position: relative;
      transition: 0.3s;
      flex-shrink: 0;
    }

    .toggle-switch.on {
      background: var(--green);
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.3s cubic-bezier(0.2, 0.85, 0.32, 1.2);
    }

    .toggle-switch.on::after {
      transform: translateX(20px);
    }

    .sender-options {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
      animation: fadeUp 0.3s;
    }

    .sender-options.show {
      display: flex;
    }

    .sender-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--card2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .sender-option.selected {
      border-color: var(--accent);
      background: rgba(10,132,255,0.1);
    }

    .sender-name {
      font-size: 14px;
      font-weight: 500;
    }

    .sender-cost {
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
    }

    .gift-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: rgba(255,214,10,0.1);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      border: 1px solid rgba(255,214,10,0.2);
    }

    .gift-total-label {
      font-size: 15px;
      color: var(--text2);
      font-weight: 500;
    }

    .gift-total-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
    }

    .gift-total-value svg {
      width: 22px;
      height: 22px;
    }

    .gift-buy-btns {
      display: flex;
      gap: 10px;
    }

    .gift-buy-btn {
      flex: 1;
      height: 54px;
      border-radius: var(--radius-md);
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s;
    }

    .gift-buy-btn:active {
      transform: scale(0.97);
    }

    .gift-buy-btn svg {
      width: 18px;
      height: 18px;
    }

    .gift-buy-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .gift-buy-btn.balance {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
    }

    .gift-buy-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* === РУЛЕТКА === */
    .roulette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.3s;
    }

    .roulette-box {
      width: 100%;
      max-width: 400px;
    }

    .roulette-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .roulette-title svg {
      width: 24px;
      height: 24px;
    }

    .roulette-window {
      position: relative;
      height: 150px;
      overflow: hidden;
      border-radius: 14px;
      background: var(--bg2);
      border: 2px solid var(--border);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
    }

    .roulette-pointer {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #fff;
      transform: translateX(-50%);
      z-index: 10;
      box-shadow: 0 0 15px rgba(255,255,255,0.9);
    }

    .roulette-pointer::before,
    .roulette-pointer::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
    }

    .roulette-pointer::before {
      top: 0;
      border-top: 14px solid #fff;
    }

    .roulette-pointer::after {
      bottom: 0;
      border-bottom: 14px solid #fff;
    }

    .roulette-strip {
      display: flex;
      height: 100%;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
    }

    .r-item {
      width: 100px;
      height: 130px;
      background: var(--card);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .r-item.star {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
    }

    .r-item.star .r-label,
    .r-item.star .r-value {
      color: #000;
    }

    .r-item.nothing {
      background: var(--card2);
      border-color: var(--card3);
    }

    .r-img {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .r-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .r-img svg {
      width: 100%;
      height: 100%;
    }

    .r-label {
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .r-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .r-value svg {
      width: 14px;
      height: 14px;
    }

    .roulette-result {
      text-align: center;
      margin-top: 24px;
      font-size: 18px;
      font-weight: 700;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .roulette-result svg {
      width: 24px;
      height: 24px;
    }

    .roulette-result.win {
      color: var(--green);
    }

    .roulette-result.lose {
      color: var(--text3);
      font-weight: 500;
    }

    .roulette-result.stars {
      color: var(--gold);
      font-size: 26px;
    }

    .roulette-result.pity {
      color: var(--green);
    }

    .roulette-close {
      width: 100%;
      height: 54px;
      margin-top: 24px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--card2);
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s;
    }

    .roulette-close:active {
      transform: scale(0.97);
    }

    .roulette-close svg {
      width: 20px;
      height: 20px;
    }

    .roulette-close.win {
      background: var(--green);
      color: #000;
    }

    .roulette-close.stars {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
    }

    /* === LOADING === */
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--card2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>

<body>
<div class="app">
  <!-- БАЛАНС ВИДЖЕТ -->
  <div class="balance-widget" id="balanceWidget">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
    </svg>

  </div>

  <!-- PITY ПРОГРЕСС -->
  <div class="pity-bar hidden" id="pityBar">

    </div>
  </div>

  <!-- СЕКЦИИ -->
  <div class="section" id="sectionHome"></div>
  <div class="section with-pity hidden" id="sectionCases"></div>
  <div class="section hidden" id="sectionGifts"></div>

  <!-- НИЖНИЕ ТАБЫ -->
  <nav class="bottom-tabs">
    <button class="bottom-tab active" id="tabHome">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span>Главная</span>
    </button>
    <button class="bottom-tab" id="tabCases">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
      </svg>

    </button>
    <button class="bottom-tab" id="tabGifts">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/>
      </svg>
      <span>Подарки</span>
    </button>
  </nav>
</div>

<!-- ПОДПИСКА OVERLAY -->
<div class="subscribe-overlay hidden" id="subscribeOverlay">
  <div class="subscribe-box">
    <div class="subscribe-icon">🔔</div>
    <div class="subscribe-title">Подпишись на каналы</div>
    <div class="subscribe-text">Чтобы использовать бота, нужно подписаться на наши каналы</div>
    <div class="subscribe-channels" id="subscribeChannels"></div>
    <button class="subscribe-check" id="subscribeCheck">Проверить подписку</button>
  </div>
</div>

<!-- CASE CHOICE MODAL -->
<div class="modal-overlay hidden" id="caseChoiceModal">
  <div class="modal-box">
    <div class="case-choice-icon" id="choiceIcon"></div>
    <div class="case-choice-title" id="choiceTitle">Открыть кейс</div>
    <div class="case-choice-btns">
      <button class="choice-btn stars" id="choiceStars">
        <div class="choice-price">
          <svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          <span id="choicePriceStars">100</span>
        </div>
        Оплатить Stars
      </button>
      <button class="choice-btn balance" id="choiceBalance">
        <div class="choice-price">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          <span id="choicePriceBalance">100</span>

        С баланса

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>

      </button>

</div>

<!-- GIFT DETAIL MODAL -->
<div class="modal-overlay hidden" id="giftDetailModal">
  <div class="modal-box" style="max-width: 360px;">
    <div class="gift-detail-preview">
      <img id="giftDetailImg" src="" alt="" />
    </div>
    <div class="gift-detail-title" id="giftDetailTitle">Подарок</div>
    
    <div class="signature-toggle" id="signatureToggle">
      <div>
        <div class="signature-label">Добавить подпись</div>
        <div class="signature-hint">от +2 Stars</div>
      </div>
      <div class="toggle-switch" id="signatureSwitch"></div>
    </div>
    
    <div class="sender-options" id="senderOptions"></div>
    
    <div class="gift-total">
      <div class="gift-total-label">Итого</div>
      <div class="gift-total-value">
        <svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <span id="giftTotalAmount">0</span>
      </div>
    </div>
    
    <div class="gift-buy-btns">
      <button class="gift-buy-btn primary" id="giftBuyStars">
        <svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <span id="giftBuyStarsAmount">0</span>
      </button>
      <button class="gift-buy-btn balance" id="giftBuyBalance">
        Баланс
        <span id="giftBuyBalanceAmount">0</span>
      </button>
    </div>
  </div>
</div>

<!-- РУЛЕТКА -->
<div class="roulette-overlay hidden" id="rouletteOverlay">
  <div class="roulette-box">
    <div class="roulette-title" id="rouletteTitle">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      <span>Открываем...</span>
    </div>
    <div class="roulette-window">
      <div class="roulette-pointer"></div>
      <div class="roulette-strip" id="rouletteStrip"></div>
    </div>
    <div class="roulette-result" id="rouletteResult"></div>
    <button class="roulette-close hidden" id="rouletteClose">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      <span>Забрать</span>
    </button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
const API = "https://podarochnica-api.onrender.com"; // Замените на ваш URL

// ===== STATE =====
const state = {
  balance: 0,
  pitySpent: 0,
  pityThreshold: 20,
  isAdmin: false,
  subscribed: true,
  channels: [],
  gifts: [],
  cases: {},
  news: [],
  selectedGift: null,
  selectedCase: null,
  addSignature: false,
  sender: "@echoaxxs",
  currentCategory: "cheap"
};

const SENDERS = [
  { key: "@echoaxxs", label: "@echoaxxs", cost: 2 },
  { key: "@bogclm", label: "@bogclm", cost: 2 },
  { key: "@bogclm и @echoaxxs", label: "@bogclm и @echoaxxs", cost: 5 },
];

const ICONS = {
  star: `<svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>`,
  nothing: `<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16" stroke="#666" stroke-width="3" fill="none"/><line x1="14" y1="14" x2="34" y2="34" stroke="#666" stroke-width="3"/></svg>`,
  box: `<svg viewBox="0 0 48 48"><path d="M6 18L24 8L42 18V34L24 44L6 34V18Z" fill="#4ECDC4"/><path d="M24 8L42 18L24 28L6 18L24 8Z" fill="#7DE8E1"/><path d="M24 28V44L6 34V18L24 28Z" fill="#3DB9B1"/></svg>`,
  diamond: `<svg viewBox="0 0 48 48"><path d="M24 4L42 18L24 44L6 18L24 4Z" fill="#A78BFA"/><path d="M24 4L6 18H42L24 4Z" fill="#C4B5FD"/><path d="M6 18L24 44V28L6 18Z" fill="#8B5CF6"/></svg>`,
  starCase: `<svg viewBox="0 0 48 48"><path d="M24 4L30 16L44 18L34 28L36 42L24 36L12 42L14 28L4 18L18 16L24 4Z" fill="#FFD60A"/><path d="M24 4L30 16L44 18L34 28L36 42L24 36" fill="#E5C000"/></svg>`,
  fire: `<svg viewBox="0 0 48 48"><path d="M24 4C24 4 12 16 12 28C12 36 17 44 24 44C31 44 36 36 36 28C36 16 24 4 24 4Z" fill="#FF6B35"/><path d="M24 16C24 16 18 22 18 30C18 36 21 40 24 40C27 40 30 36 30 30C30 22 24 16 24 16Z" fill="#FFD93D"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`,
  close: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  ticket: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 10V6c0-1.11-.9-2-2-2H4c-1.1 0-1.99.89-1.99 2v4c1.1 0 1.99.9 1.99 2s-.89 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2z"/></svg>`,
  shield: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>`,
  telegram: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.37-.49 1.02-.75 3.98-1.73 6.64-2.87 7.97-3.43 3.79-1.52 4.58-1.78 5.09-1.79.11 0 .37.03.53.14.14.1.18.23.2.33.02.1.03.29.02.45z"/></svg>`,
};

// ===== API =====
async function api(endpoint, data = {}) {
  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData: tg?.initData || "", ...data })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return res.json();
  } catch (e) {
    console.error(`API ${endpoint}:`, e);
    throw e;
  }
}

async function apiGet(endpoint) {
  const res = await fetch(`${API}${endpoint}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ===== INIT =====
async function init() {
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#000000');
    tg.setBackgroundColor('#000000');
  }
  
  // Проверка подписки
  try {
    const sub = await api("/api/check-subscription");
    state.subscribed = sub.subscribed;
    state.channels = sub.channels || [];
    
    if (!state.subscribed && state.channels.length > 0) {
      showSubscribeOverlay();
      return;
    }
  } catch (e) {
    console.error("Subscription check failed:", e);
    // Продолжаем без проверки при ошибке
  }
  
  await loadApp();
}

async function loadApp() {
  await Promise.all([
    loadUserData(),
    loadStaticData()
  ]);
  
  renderHome();
  renderCases();
  renderGifts();
  setupTabs();
  updateUI();
}

async function loadUserData() {
  try {
    const data = await api("/api/get-user-data");
    state.balance = data.starBalance || 0;
    state.pitySpent = data.pitySpent || 0;
    state.pityThreshold = data.pityThreshold || 20;
    state.isAdmin = data.isAdmin || false;
  } catch (e) {
    console.error("Load user data failed:", e);
  }
}

async function loadStaticData() {
  try {
    const [newsRes, giftsRes, casesRes] = await Promise.all([
      apiGet("/api/get-news"),
      apiGet("/api/get-gifts"),
      apiGet("/api/get-cases")
    ]);
    state.news = newsRes.news || [];
    state.gifts = giftsRes.gifts || [];
    state.cases = casesRes.categories || {};
    state.pityThreshold = casesRes.pityThreshold || 20;
  } catch (e) {
    console.error("Load static data failed:", e);
  }
}

// ===== UI UPDATES =====
function updateUI() {
  // Баланс
  document.getElementById("balanceValue").textContent = state.balance.toLocaleString();
  
  // Pity прогресс
  const pityBar = document.getElementById("pityBar");
  const remaining = state.pityThreshold - state.pitySpent;
  
  if (state.pitySpent > 0 && remaining > 0) {
    pityBar.classList.remove("hidden");
    document.getElementById("pityValue").textContent = `${remaining}⭐`;
    document.getElementById("pityFill").style.width = `${(state.pitySpent / state.pityThreshold) * 100}%`;
  } else {
    pityBar.classList.add("hidden");
  }
}

// ===== SUBSCRIBE OVERLAY =====

// ===== TABS =====
function setupTabs() {
  const tabs = {
    Home: "sectionHome",
    Cases: "sectionCases",
    Gifts: "sectionGifts"
  };
  
  Object.keys(tabs).forEach(name => {
    document.getElementById(`tab${name}`).onclick = () => {
      Object.keys(tabs).forEach(n => {
        document.getElementById(`tab${n}`).classList.toggle("active", n === name);
        document.getElementById(tabs[n]).classList.toggle("hidden", n !== name);
      });
      
      // Показывать pity bar только на вкладке кейсов
      const pityBar = document.getElementById("pityBar");

        pityBar.classList.remove("hidden");
      } else {
        pityBar.classList.add("hidden");
      }
    };
  });
}

async function activatePromocode() {
  const input = document.getElementById("promoInput");
  const result = document.getElementById("promoResult");
  const code = input.value.trim();
  
  if (!code) return;
  
  try {
    const res = await api("/api/activate-promocode", { code });
    result.innerHTML = `${ICONS.check}<span>${res.reward}</span>`;
    result.className = "promo-result success";
    
    if (res.newBalance !== undefined) {
      state.balance = res.newBalance;
      updateUI();
    }
  } catch (e) {
    result.innerHTML = `${ICONS.close}<span>${e.message}</span>`;
    result.className = "promo-result error";
  }
  
  result.classList.remove("hidden");
  input.value = "";
}

async function loadAdminPromocodes() {
  try {
    const res = await api("/api/admin/get-promocodes");
    const list = document.getElementById("adminPromoList");
    if (!list) return;
    
    list.innerHTML = (res.promocodes || []).map(p => `
      <div class="admin-promo-item">
        <div>
          <div class="admin-promo-code">${p.code}</div>
          <div class="admin-promo-info">${p.rewardType}:${p.rewardId} • ${p.uses}/${p.maxUses}</div>
        </div>
        <button class="admin-promo-del" data-code="${p.code}">${ICONS.close}</button>
      </div>
    `).join("");
    
    list.querySelectorAll(".admin-promo-del").forEach(btn => {
      btn.onclick = () => deletePromocode(btn.dataset.code);
    });
  } catch (e) {
    console.error("Load promocodes failed:", e);
  }
}

async function createPromocode() {
  const code = document.getElementById("adminCode").value.trim();
  const type = document.getElementById("adminType").value;
  const rewardId = document.getElementById("adminRewardId").value.trim();
  const maxUses = parseInt(document.getElementById("adminMaxUses").value) || 100;
  
  if (!code || !rewardId) {
    alert("Заполни все поля");
    return;
  }
  
  try {
    await api("/api/admin/create-promocode", { code, rewardType: type, rewardId, maxUses });
    loadAdminPromocodes();
    document.getElementById("adminCode").value = "";
    document.getElementById("adminRewardId").value = "";
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
}

async function deletePromocode(code) {
  if (!confirm(`Удалить промокод ${code}?`)) return;
  
  try {
    await api("/api/admin/delete-promocode", { code });
    loadAdminPromocodes();
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
}

// ===== РУЛЕТКА =====
function showRoulette(caseData, result) {
  const overlay = document.getElementById("rouletteOverlay");
  const strip = document.getElementById("rouletteStrip");
  const resultDiv = document.getElementById("rouletteResult");
  const closeBtn = document.getElementById("rouletteClose");
  const titleDiv = document.getElementById("rouletteTitle");
  
  overlay.classList.remove("hidden");
  resultDiv.textContent = "";
  resultDiv.className = "roulette-result";
  closeBtn.classList.add("hidden");
  closeBtn.className = "roulette-close hidden";
  
  const isStarCase = caseData.type === "stars";
  const iconHtml = isStarCase ? ICONS.starCase : ICONS.box;
  titleDiv.innerHTML = `${iconHtml}<span>${caseData.title}</span>`;
  
  // Собираем items для рулетки
  let items = [];
  
  if (isStarCase) {
    // Star case - показываем звёзды
    const allDrops = result.allDrops || result.all_drops || caseData.possible_drops || [];
    const winAmount = result.starsWon || result.stars_won || 0;
    
    for (let i = 0; i < 50; i++) {
      const drop = allDrops[Math.floor(Math.random() * allDrops.length)];
      items.push({ type: "star", stars: drop?.stars || 100 });
    }
    // Ставим выигрыш на позицию 38
    items[38] = { type: "star", stars: winAmount };
    
  } else {
    // Gift case
    const possibleGifts = (caseData.possible_drops || [])
      .map(d => state.gifts.find(g => g.id === d.gift_id))
      .filter(Boolean);
    
    for (let i = 0; i < 50; i++) {
      if (Math.random() < 0.25 || possibleGifts.length === 0) {
        items.push({ type: "nothing" });
      } else {
        items.push({ type: "gift", gift: possibleGifts[Math.floor(Math.random() * possibleGifts.length)] });
      }
    }
    
    // Ставим результат
    if (result.type === "nothing") {
      items[38] = { type: "nothing" };
      // Приманки рядом
      if (possibleGifts.length > 0) {
        items[37] = { type: "gift", gift: possibleGifts[0] };
        items[39] = { type: "gift", gift: possibleGifts[possibleGifts.length - 1] };
      }
    } else if (result.type === "gifts" && result.won?.length > 0) {
      const wonGift = state.gifts.find(g => g.title === result.won[0]?.title || g.id === result.won[0]?.id);
      items[38] = wonGift ? { type: "gift", gift: wonGift } : { type: "nothing" };
    } else if (result.pityTriggered || result.pity_triggered) {
      // Pity gift
      const pityGift = state.gifts.find(g => g.id === "heart") || state.gifts[0];
      items[38] = pityGift ? { type: "gift", gift: pityGift } : { type: "nothing" };
    }
  }
  
  // Render strip
  strip.innerHTML = items.map(item => {
    if (item.type === "star") {
      return `
        <div class="r-item star">
          <div class="r-img">${ICONS.star}</div>
          <div class="r-label">Stars</div>
          <div class="r-value">${ICONS.star}${item.stars}</div>
        </div>
      `;
    } else if (item.type === "nothing") {
      return `
        <div class="r-item nothing">
          <div class="r-img">${ICONS.nothing}</div>
          <div class="r-label">Пусто</div>
          <div class="r-value">---</div>
        </div>
      `;
    } else {
      return `
        <div class="r-item">
          <div class="r-img"><img src="${item.gift.gif_url}" alt=""></div>
          <div class="r-label">${item.gift.title}</div>
          <div class="r-value">${ICONS.star}${item.gift.price}</div>
        </div>
      `;
    }
  }).join("");
  
  // Анимация
  strip.style.transition = "none";
  strip.style.transform = "translateX(0)";
  
  const containerWidth = document.querySelector('.roulette-window').offsetWidth;
  const itemWidth = 100;
  const gap = 8;
  const advance = itemWidth + gap;
  const winIndex = 38;
  const itemCenter = 4 + (winIndex * advance) + (itemWidth / 2);
  const randomOffset = (Math.random() * 80) - 40;
  const targetX = (containerWidth / 2) - itemCenter + randomOffset;
  
  setTimeout(() => {
    strip.style.transition = "transform 5s cubic-bezier(0.1, 0.9, 0.2, 1)";
    strip.style.transform = `translateX(${targetX}px)`;
  }, 100);
  
  // Показать результат
  setTimeout(() => {
    if (isStarCase) {
      const won = result.starsWon || result.stars_won || 0;
      resultDiv.innerHTML = `${ICONS.star}<span>+${won} Stars!</span>`;
      resultDiv.classList.add("stars");
      closeBtn.classList.add("stars");
      closeBtn.querySelector("span").textContent = "Забрать!";
    } else if (result.type === "nothing") {
      resultDiv.innerHTML = `${ICONS.close}<span>Ничего...</span>`;
      resultDiv.classList.add("lose");
      closeBtn.querySelector("span").textContent = "Закрыть";
    } else if (result.pityTriggered || result.pity_triggered) {
      resultDiv.innerHTML = `${ICONS.check}<span>🎁 Гарантированный подарок!</span>`;
      resultDiv.classList.add("pity");
      closeBtn.classList.add("win");
      closeBtn.querySelector("span").textContent = "Отлично!";
    } else if (result.type === "gifts" && result.won?.length > 0) {
      const wonTitle = result.won[0]?.title || "Подарок";
      resultDiv.innerHTML = `${ICONS.check}<span>${wonTitle}!</span>`;
      resultDiv.classList.add("win");
      closeBtn.classList.add("win");
      closeBtn.querySelector("span").textContent = "Забрать!";
    }
    
    closeBtn.classList.remove("hidden");
  }, 5200);
}

document.getElementById("rouletteClose").onclick = () => {
  document.getElementById("rouletteOverlay").classList.add("hidden");
  renderCases();
};

// ===== START =====
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
